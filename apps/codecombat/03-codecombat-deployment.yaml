apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecombat
  namespace: codecombat
  labels:
    app: codecombat
    app.kubernetes.io/name: codecombat
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecombat
      app.kubernetes.io/name: codecombat
  template:
    metadata:
      labels:
        app: codecombat
        app.kubernetes.io/name: codecombat
        app.kubernetes.io/component: application
    spec:
      containers:
        - name: codecombat
          image: eedkevin/codecombat:latest
          command:
            - sh
            - -c
            - |
              cd /home/chenlu/codecombat && node index.js 2>&1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: COCO_MONGO_HOST
              value: "mongodb"
            - name: COCO_MONGO_PORT
              value: "27017"
            - name: COCO_MONGO_DATABASE_NAME
              value: "codecombat"
            - name: COCO_MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: COCO_MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_MONGO_URL
            - name: COCO_MONGO_ANALYTICS_HOST
              value: "mongodb"
            - name: COCO_MONGO_ANALYTICS_PORT
              value: "27017"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_ENV
            - name: COCO_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_COOKIE_SECRET
            - name: COCO_SENDWITHUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_SENDWITHUS_API_KEY
            - name: COCO_MAIN_HOSTNAME
              value: "codecombat.mbtux.com"
            - name: COCO_UNSAFE_CONTENT_HOSTNAME
              value: "codecombat.mbtux.com"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 20
      # No nodeSelector - let scheduler pick available worker
