apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecombat
  namespace: codecombat
  labels:
    app: codecombat
    app.kubernetes.io/name: codecombat
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecombat
      app.kubernetes.io/name: codecombat
  template:
    metadata:
      labels:
        app: codecombat
        app.kubernetes.io/name: codecombat
        app.kubernetes.io/component: application
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready"
        - name: clone-and-install
          image: node:20
          command:
            - sh
            - -c
            - |
              set -e
              if [ ! -f /app/package.json ]; then
                echo "Cloning CodeCombat..."
                apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
                git clone --depth 1 https://github.com/codecombat/codecombat.git /app
              fi
              cd /app
              echo "Running npm install..."
              npm install --force 2>&1 | tail -10
              echo "Running build..."
              npm run build 2>&1 | tail -10
              echo "Build complete"
          volumeMounts:
            - name: app-code
              mountPath: /app
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4"
      containers:
        - name: codecombat
          image: node:20
          workingDir: /app
          command:
            - sh
            - -c
            - |
              node index.js 2>&1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_MONGO_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_ENV
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          emptyDir:
            sizeLimit: 8Gi
      nodeSelector:
        kubernetes.io/hostname: mouse-worker-data-cluster.mbtux.com
