apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecombat
  namespace: codecombat
  labels:
    app: codecombat
    app.kubernetes.io/name: codecombat
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecombat
      app.kubernetes.io/name: codecombat
  template:
    metadata:
      labels:
        app: codecombat
        app.kubernetes.io/name: codecombat
        app.kubernetes.io/component: application
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready"
      containers:
        - name: codecombat
          image: codecombat/codecombat:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_MONGO_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_ENV
            - name: COCO_ANALYTICS
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_ANALYTICS
            - name: COCO_SSL_HIERARCHY
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_SSL_HIERARCHY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
