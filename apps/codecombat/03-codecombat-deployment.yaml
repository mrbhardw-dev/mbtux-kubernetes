apiVersion: apps/v1
kind: Deployment
metadata:
  name: codecombat
  namespace: codecombat
  labels:
    app: codecombat
    app.kubernetes.io/name: codecombat
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codecombat
      app.kubernetes.io/name: codecombat
  template:
    metadata:
      labels:
        app: codecombat
        app.kubernetes.io/name: codecombat
        app.kubernetes.io/component: application
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready"
        - name: clone-codecombat
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              for i in 1 2 3 4 5; do
                apk add --no-cache git && break
                echo "apk attempt $i failed, retrying..."
                sleep 10
              done
              if [ ! -f /app/package.json ]; then
                for i in 1 2 3 4 5; do
                  git clone --depth 1 https://github.com/codecombat/codecombat.git /app && break
                  echo "git clone attempt $i failed, retrying..."
                  rm -rf /app/*
                  sleep 10
                done
              fi
          volumeMounts:
            - name: app-code
              mountPath: /app
      containers:
        - name: codecombat
          image: node:20
          workingDir: /app
          command:
            - sh
            - -c
            - |
              if [ ! -d "/app/node_modules/.package-lock.json" ]; then
                echo "Running npm install..."
                npm install 2>&1
              fi
              echo "Starting CodeCombat..."
              npm start 2>&1
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: codecombat-secrets
                  key: COCO_MONGO_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: codecombat-config
                  key: COCO_ENV
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          emptyDir:
            sizeLimit: 2Gi
      nodeSelector:
        kubernetes.io/hostname: tuna-master-data-cluster.mbtux.com
