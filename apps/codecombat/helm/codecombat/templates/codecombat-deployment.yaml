apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codecombat.fullname" . }}
  namespace: {{ include "codecombat.namespace" . }}
  labels:
    {{- include "codecombat.appLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.codecombat.replicaCount }}
  selector:
    matchLabels:
      {{- include "codecombat.appSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codecombat.appSelectorLabels" . | nindent 8 }}
      {{- with .Values.codecombat.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb {{ .Values.mongodb.service.port }}; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready"
        - name: clone-codecombat
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache git
              if [ ! -f /app/package.json ]; then
                git clone --depth 1 https://github.com/codecombat/codecombat.git /app
              fi
          volumeMounts:
            - name: app-code
              mountPath: /app
      containers:
        - name: codecombat
          image: "{{ .Values.codecombat.image.repository }}:{{ .Values.codecombat.image.tag }}"
          imagePullPolicy: {{ .Values.codecombat.image.pullPolicy }}
          workingDir: /app
          command:
            - sh
            - -c
            - |
              if [ ! -d "/app/node_modules/.package-lock.json" ]; then
                echo "Running npm install..."
                npm install 2>&1
              fi
              echo "Starting CodeCombat..."
              npm start 2>&1
          ports:
            - containerPort: {{ .Values.codecombat.port }}
              name: http
          env:
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "codecombat.fullname" . }}-secrets
                  key: COCO_MONGO_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_ENV
            - name: COCO_ANALYTICS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_ANALYTICS
            - name: COCO_SSL_HIERARCHY
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_SSL_HIERARCHY
          resources:
            {{- toYaml .Values.codecombat.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: app-code
              mountPath: /app
      {{- with .Values.codecombat.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codecombat.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codecombat.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: app-code
          emptyDir:
            sizeLimit: 2Gi
