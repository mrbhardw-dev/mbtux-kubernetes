apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codecombat.fullname" . }}
  namespace: {{ include "codecombat.namespace" . }}
  labels:
    {{- include "codecombat.appLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.codecombat.replicaCount }}
  selector:
    matchLabels:
      {{- include "codecombat.appSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codecombat.appSelectorLabels" . | nindent 8 }}
      {{- with .Values.codecombat.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.mongodb.enabled }}
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mongodb {{ .Values.mongodb.service.port }}; do
                echo "Waiting for MongoDB..."
                sleep 2
              done
              echo "MongoDB is ready"
      {{- end }}
      containers:
        - name: codecombat
          image: "{{ .Values.codecombat.image.repository }}:{{ .Values.codecombat.image.tag }}"
          imagePullPolicy: {{ .Values.codecombat.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.codecombat.port }}
              name: http
          env:
            - name: COCO_MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "codecombat.fullname" . }}-secrets
                  key: COCO_MONGO_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: PORT
            - name: COCO_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_ENV
            - name: COCO_ANALYTICS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_ANALYTICS
            - name: COCO_SSL_HIERARCHY
              valueFrom:
                configMapKeyRef:
                  name: {{ include "codecombat.fullname" . }}-config
                  key: COCO_SSL_HIERARCHY
          resources:
            {{- toYaml .Values.codecombat.resources | nindent 12 }}
          {{- if .Values.codecombat.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.codecombat.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.codecombat.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.codecombat.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.codecombat.startupProbe }}
          startupProbe:
            {{- toYaml .Values.codecombat.startupProbe | nindent 12 }}
          {{- end }}
      {{- with .Values.codecombat.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codecombat.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.codecombat.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
