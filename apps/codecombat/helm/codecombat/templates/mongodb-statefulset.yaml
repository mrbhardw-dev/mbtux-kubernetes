{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "codecombat.fullname" . }}-mongodb-data
  namespace: {{ include "codecombat.namespace" . }}
  labels:
    {{- include "codecombat.mongodbLabels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.mongodb.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}
  {{- if .Values.mongodb.persistence.storageClass }}
  storageClassName: {{ .Values.mongodb.persistence.storageClass }}
  {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ include "codecombat.namespace" . }}
  labels:
    {{- include "codecombat.mongodbLabels" . | nindent 4 }}
spec:
  serviceName: mongodb
  replicas: {{ .Values.mongodb.replicaCount }}
  selector:
    matchLabels:
      {{- include "codecombat.mongodbSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "codecombat.mongodbSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mongodb.service.port }}
              name: mongodb
          env:
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.auth.database | quote }}
            {{- if .Values.mongodb.auth.enabled }}
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "codecombat.fullname" . }}-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "codecombat.fullname" . }}-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            {{- end }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          {{- if .Values.mongodb.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.mongodb.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.mongodb.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.mongodb.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.mongodb.startupProbe }}
          startupProbe:
            {{- toYaml .Values.mongodb.startupProbe | nindent 12 }}
          {{- end }}
      {{- with .Values.mongodb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mongodb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: {{ include "codecombat.fullname" . }}-mongodb-data
{{- end }}
