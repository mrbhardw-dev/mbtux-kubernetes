# =============================================================================
# CodeCombat Helm Chart Values
# =============================================================================
# Deploy CodeCombat on Kubernetes with MongoDB backend
# Usage: helm install codecombat ./helm/codecombat -f values.yaml -n codecombat

# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []
  # -- Storage class for PVCs (use "proxmox-csi" for this cluster)
  storageClass: "local-path"

# =============================================================================
# CodeCombat Application Configuration
# =============================================================================
codecombat:
  # -- Number of CodeCombat replicas
  replicaCount: 1

  image:
    # -- CodeCombat container image (build from https://github.com/codecombat/codecombat)
    # No official image exists; use node:20 with init container to clone source
    repository: node
    tag: "20"
    pullPolicy: IfNotPresent

  # -- Service account configuration
  serviceAccount:
    create: false
    name: ""

  # -- Container port
  port: 3000

  # -- Service configuration
  service:
    type: ClusterIP
    port: 80

  # -- Resource limits and requests
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Health check probes
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

  # -- Node selector for pod scheduling
  nodeSelector: {}

  # -- Tolerations for pod scheduling
  tolerations: []

  # -- Affinity rules for pod scheduling
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Extra environment variables (added to configMap values)
  extraEnv: {}
  #   SMTP_HOST: "smtp.example.com"
  #   SMTP_PORT: "587"

# =============================================================================
# Environment Configuration
# =============================================================================
config:
  # -- Node environment
  nodeEnv: "production"
  # -- CodeCombat environment
  cocoEnv: "production"
  # -- Analytics toggle
  cocoAnalytics: "false"
  # -- SSL hierarchy
  cocoSslHierarchy: "true"
  # -- Disable thang saving
  cocoDisableThangSaving: "false"
  # -- Proxy mode
  cocoProxy: "false"

# =============================================================================
# Secrets (sensitive configuration)
# =============================================================================
secrets:
  # -- MongoDB root username
  mongoUsername: "codecombat"
  # -- MongoDB root password (CHANGE THIS IN PRODUCTION)
  mongoPassword: "changeme-use-strong-password"
  # -- Custom MongoDB connection URL (auto-generated if empty)
  mongoUrl: ""
  # -- SMTP password
  smtpPassword: ""

# =============================================================================
# MongoDB Configuration
# =============================================================================
mongodb:
  # -- Enable bundled MongoDB (set to false to use external database)
  enabled: true

  # -- MongoDB replica count (1 for standalone, 3+ for replica set)
  replicaCount: 1

  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent

  # -- MongoDB auth configuration
  auth:
    enabled: true
    rootUser: "codecombat"
    rootPassword: "changeme-use-strong-password"
    database: "codecombat"

  # -- Persistent volume configuration
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "local-path"
    accessModes:
      - ReadWriteOnce

  # -- Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Health checks
  livenessProbe:
    exec:
      command:
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    exec:
      command:
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 30

  # -- Node selector
  nodeSelector: {}
  # -- Tolerations
  tolerations: []
  # -- Affinity
  affinity: {}

  # -- Service configuration
  service:
    port: 27017

# -- External MongoDB (used when mongodb.enabled=false)
externalMongoDB:
  host: ""
  port: 27017
  database: "codecombat"
  username: ""
  password: ""

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  # -- Enable ingress
  enabled: true

  # -- Ingress class name
  ingressClassName: "nginx"

  # -- Hostname
  host: "codecombat.mbtux.com"

  # -- Additional ingress annotations
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/websocket-services: "codecombat"

  # -- TLS configuration with cert-manager
  tls:
    enabled: false
    # -- cert-manager ClusterIssuer name
    clusterIssuer: "letsencrypt-prod"
    # -- TLS secret name (auto-generated if empty)
    secretName: "codecombat-tls"

# =============================================================================
# Backup Configuration
# =============================================================================
backup:
  # -- Enable automated MongoDB backups
  enabled: false
  # -- Cron schedule for backups
  schedule: "0 2 * * *"
  # -- Number of backup files to retain
  retainCount: 7
  # -- Backup PVC size
  storageSize: 20Gi
  # -- Storage class for backup PVC
  storageClass: "local-path"
