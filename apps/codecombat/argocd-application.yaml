apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codecombat
  namespace: argocd
  labels:
    app.kubernetes.io/name: codecombat
    app.kubernetes.io/part-of: codecombat
    cluster: data
spec:
  project: data-cluster
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes
    targetRevision: main
    path: apps/codecombat
  destination:
    server: https://kubernetes.default.svc
    namespace: codecombat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
