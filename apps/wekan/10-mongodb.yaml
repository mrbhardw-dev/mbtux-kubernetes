apiVersion: v1
kind: Service
metadata:
  name: wekan-mongo
  namespace: wekan
spec:
  selector:
    app: wekan-mongo
  ports:
  - port: 27017
    targetPort: 27017
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wekan-mongo-pvc
  namespace: wekan
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wekan-mongo
  namespace: wekan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wekan-mongo
  template:
    metadata:
      labels:
        app: wekan-mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
      - name: mongo-storage
        persistentVolumeClaim:
          claimName: wekan-mongo-pvc