apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: taiga-ingressroute
  namespace: taiga
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`taiga.mbtux.com`)
    services:
    - name: taiga
      port: 80
    middlewares:
    - name: security-headers
    - name: compress
  tls:
    options:
      name: secure-default