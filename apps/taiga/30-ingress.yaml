apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taiga-ingress
  namespace: taiga
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: taiga.mbtux.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: taiga
            port:
              number: 80