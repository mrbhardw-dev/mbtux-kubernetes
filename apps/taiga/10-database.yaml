apiVersion: v1
kind: Service
metadata:
  name: taiga-postgres
  namespace: taiga
spec:
  selector:
    app: taiga-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: taiga-postgres-pvc
  namespace: taiga
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taiga-postgres
  namespace: taiga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taiga-postgres
  template:
    metadata:
      labels:
        app: taiga-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "taiga"
        - name: POSTGRES_USER
          value: "taiga_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: database-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: taiga-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: taiga-redis
  namespace: taiga
spec:
  selector:
    app: taiga-redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: taiga-redis-pvc
  namespace: taiga
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taiga-redis
  namespace: taiga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taiga-redis
  template:
    metadata:
      labels:
        app: taiga-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes"]
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: taiga-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: taiga-rabbitmq
  namespace: taiga
spec:
  selector:
    app: taiga-rabbitmq
  ports:
  - port: 5672
    targetPort: 5672
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: taiga-rabbitmq-pvc
  namespace: taiga
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taiga-rabbitmq
  namespace: taiga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taiga-rabbitmq
  template:
    metadata:
      labels:
        app: taiga-rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: rabbitmq-username
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: rabbitmq-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq
      volumes:
      - name: rabbitmq-storage
        persistentVolumeClaim:
          claimName: taiga-rabbitmq-pvc