# Taiga Back (API) Service
apiVersion: v1
kind: Service
metadata:
  name: taiga-back
  namespace: taiga
  labels:
    app: taiga-back
spec:
  type: ClusterIP
  selector:
    app: taiga-back
  ports:
  - port: 80
    targetPort: 8001
    protocol: TCP
    name: http
---
# Taiga Front (Web UI) Service
apiVersion: v1
kind: Service
metadata:
  name: taiga-front
  namespace: taiga
  labels:
    app: taiga-front
spec:
  type: ClusterIP
  selector:
    app: taiga-front
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
# Taiga Events (WebSockets) Service
apiVersion: v1
kind: Service
metadata:
  name: taiga-events
  namespace: taiga
  labels:
    app: taiga-events
spec:
  type: ClusterIP
  selector:
    app: taiga-events
  ports:
  - port: 80
    targetPort: 8888
    protocol: TCP
    name: http
---
# Taiga Protected (Media) Service
apiVersion: v1
kind: Service
metadata:
  name: taiga-protected
  namespace: taiga
  labels:
    app: taiga-protected
spec:
  type: ClusterIP
  selector:
    app: taiga-protected
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
# Main Taiga Service (for external access)
apiVersion: v1
kind: Service
metadata:
  name: taiga
  namespace: taiga
  labels:
    app: taiga
spec:
  type: ClusterIP
  selector:
    app: taiga-front
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
---
# Taiga Back (API) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taiga-back
  namespace: taiga
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taiga-back
  template:
    metadata:
      labels:
        app: taiga-back
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z sure-postgres.sure.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z sure-redis.sure.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done;']
      - name: wait-for-rabbitmq
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z taiga-rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done;']
      containers:
      - name: taiga-back
        image: docker.io/taigaio/taiga-back:6.5.1
        imagePullPolicy: Always
        startupProbe:
          tcpSocket:
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        ports:
        - name: http
          containerPort: 8001
        env:
        - name: TAIGA_SITE_NAME
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: TAIGA_SITE_NAME
        - name: TAIGA_DOMAIN
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: TAIGA_DOMAIN
        - name: TAIGA_SCHEME
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: TAIGA_SCHEME
        - name: SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: SECRET_KEY
        - name: PUBLIC_REGISTER_ENABLED
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: PUBLIC_REGISTER_ENABLED
        - name: DEFAULT_LANGUAGE
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DEFAULT_LANGUAGE
        - name: DEFAULT_TIMEZONE
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DEFAULT_TIMEZONE
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DB_NAME
        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: database-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: REDIS_PORT
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: taiga-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: rabbitmq-username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: rabbitmq-password
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: smtp-host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: smtp-port
        - name: SMTP_TLS_ENABLED
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: smtp-tls-enabled
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: smtp-username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: smtp-password
        - name: EMAIL_SENDER
          valueFrom:
            secretKeyRef:
              name: taiga-secrets
              key: email-sender
        livenessProbe:
          tcpSocket:
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          tcpSocket:
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: taiga-storage
          mountPath: /taiga-back/media
      volumes:
      - name: taiga-storage
        persistentVolumeClaim:
          claimName: taiga-pvc
---
# Taiga Front (Web UI) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taiga-front
  namespace: taiga
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taiga-front
  template:
    metadata:
      labels:
        app: taiga-front
    spec:
      containers:
      - name: taiga-front
        image: docker.io/taigaio/taiga-front:6.5.1
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
        env:
        - name: TAIGA_URL
          value: "http://taiga-back"
        - name: TAIGA_WEBSOCKETS_URL
          value: "ws://taiga-events"
        - name: TAIGA_PROTECTED_URL
          value: "http://taiga-protected"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
---
