apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sure
  namespace: sure
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sure.mbtux.com
        - "*.mbtux.com"
        - mbtux.com
      secretName: cloudflare-origin-cert
  rules:
    - host: sure.mbtux.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sure
                port:
                  number: 80