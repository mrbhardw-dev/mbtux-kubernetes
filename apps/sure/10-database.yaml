apiVersion: v1
kind: Service
metadata:
  name: sure-postgres
  namespace: sure
spec:
  selector:
    app: sure-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-postgres-pvc
  namespace: sure
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-postgres
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-postgres
  template:
    metadata:
      labels:
        app: sure-postgres
    spec:
      initContainers:
      - name: init-db
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          echo "Waiting for postgres to be ready..."
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 1
          done
          echo "Postgres is ready. Checking database..."
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_DB}'" | grep -q 1 || \
            PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -c "CREATE DATABASE ${POSTGRES_DB};"
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -tc "SELECT 1 FROM pg_roles WHERE rolname = '${POSTGRES_USER}'" | grep -q 1 || \
            PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -c "CREATE USER ${POSTGRES_USER} WITH PASSWORD '${POSTGRES_PASSWORD}';"
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE ${POSTGRES_DB} TO ${POSTGRES_USER};"
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U postgres -d ${POSTGRES_DB} -c "GRANT ALL ON SCHEMA public TO ${POSTGRES_USER};"
        env:
        - name: POSTGRES_DB
          value: "sure_development"
        - name: POSTGRES_USER
          value: "sure_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: postgres-password
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "sure_development"
        - name: POSTGRES_USER
          value: "sure_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: postgres-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sure_user -d sure_development
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sure_user -d sure_development
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: sure-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sure-redis
  namespace: sure
spec:
  selector:
    app: sure-redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-redis-pvc
  namespace: sure
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-redis
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-redis
  template:
    metadata:
      labels:
        app: sure-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes"]
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: sure-redis-pvc