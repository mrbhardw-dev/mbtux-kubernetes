apiVersion: v1
kind: Service
metadata:
  name: sure-postgres
  namespace: sure
spec:
  selector:
    app: sure-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-postgres-pvc
  namespace: sure
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-postgres
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-postgres
  template:
    metadata:
      labels:
        app: sure-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "sure_development"
        - name: POSTGRES_USER
          value: "sure_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sure-secrets
              key: postgres-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: sure-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sure-redis
  namespace: sure
spec:
  selector:
    app: sure-redis
  ports:
  - port: 6379
    targetPort: 6379
  clusterIP: None
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sure-redis-pvc
  namespace: sure
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sure-redis
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sure-redis
  template:
    metadata:
      labels:
        app: sure-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command: ["redis-server", "--appendonly", "yes"]
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: sure-redis-pvc