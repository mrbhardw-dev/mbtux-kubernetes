apiVersion: batch/v1
kind: Job
metadata:
  name: plane-migrate
  namespace: plane
spec:
  template:
    metadata:
      name: plane-migrate
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate
        image: makeplane/plane-backend:stable
        imagePullPolicy: Always
        command: ["python", "manage.py", "migrate"]
        env:
        - name: POSTGRES_HOST
          value: "plane-postgres"
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: POSTGRES_DB
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: POSTGRES_PORT
        - name: POSTGRES_USER
          value: plane_user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: plane-secrets
              key: postgres-password
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: REDIS_URL
        - name: WEB_URL
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: WEB_URL
        - name: API_URL
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: API_URL
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: ENV
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: plane-secrets
              key: secret-key
        - name: ENABLE_OAUTH
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: ENABLE_OAUTH
        - name: ENABLE_EMAIL_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: ENABLE_EMAIL_PASSWORD
        - name: OAUTH_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_CLIENT_ID
        - name: OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: plane-secrets
              key: oauth-client-secret
        - name: OAUTH_AUTHORIZATION_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_AUTHORIZATION_ENDPOINTS
        - name: OAUTH_TOKEN_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_TOKEN_ENDPOINTS
        - name: OAUTH_USER_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_USER_ENDPOINTS
        - name: OAUTH_SCOPES
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_SCOPES
        - name: OAUTH_2_ENABLED
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_ENABLED
        - name: OAUTH_2_CLIENT_ID
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_CLIENT_ID
        - name: OAUTH_2_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: plane-secrets
              key: oauth-client-secret
        - name: OAUTH_2_AUTHORIZATION_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_AUTHORIZATION_ENDPOINTS
        - name: OAUTH_2_TOKEN_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_TOKEN_ENDPOINTS
        - name: OAUTH_2_USER_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_USER_ENDPOINTS
        - name: OAUTH_2_SCOPES
          valueFrom:
            configMapKeyRef:
              name: plane-config
              key: OAUTH_2_SCOPES