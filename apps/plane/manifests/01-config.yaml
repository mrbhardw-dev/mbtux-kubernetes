apiVersion: v1
kind: ConfigMap
metadata:
  name: plane-config
  namespace: plane
data:
  NGINX_WORKER_PROCESSES: "auto"
  NGINX_WORKER_CONNECTIONS: "2048"
  WEB_URL: "https://plane.mbtux.com"
  NEXT_PUBLIC_API_BASE_URL: "https://plane.mbtux.com/api/v1"
  API_URL: "https://plane.mbtux.com/api/v1"
  ENV: "production"
  DEBUG: "0"
  ENABLE_TELEMETRY: "false"
  ENABLE_ANALYTICS: "false"
  SECRET_KEY: "plane-secret-key-change-in-production"
  POSTGRES_DB: "plane"
  POSTGRES_HOST: "plane-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "plane_user"
  REDIS_URL: "redis://plane-redis:6379"
  REDIS_CACHE: "redis://plane-redis:6379/0"
  BROKER_TYPE: "redis"
  BROKER_URL: "redis://plane-redis:6379/1"
  WEB_CONCURRENCY: "4"
  WORKERS: "4"
  HUBSPOT_API_KEY: ""
  MINIO_ROOT_USER: "plane"
  MINIO_ROOT_PASSWORD: "plane-minio-password"
  MINIO_HOST: "plane-minio:9000"