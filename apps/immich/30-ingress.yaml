apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich-ingressroute
  namespace: immich
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`immich.mbtux.com`)
    services:
    - name: immich-web
      port: 3000
    middlewares:
    - name: security-headers
    - name: compress
  tls:
    options:
      name: secure-default