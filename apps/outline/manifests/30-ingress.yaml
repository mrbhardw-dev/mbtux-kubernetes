apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: outline-tls
  namespace: outline
spec:
  secretName: outline-tls
  issuerRef:
    name: vault-pki-issuer
    kind: ClusterIssuer
  dnsNames:
    - outline.mbtux.com
  duration: 8760h
  renewBefore: 720h
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outline
  namespace: outline
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - outline.mbtux.com
      secretName: outline-tls
  rules:
    - host: outline.mbtux.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline
                port:
                  number: 80