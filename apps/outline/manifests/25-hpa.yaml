apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: outline
  namespace: outline
  labels:
    app: outline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: outline
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: outline-pdb
  namespace: outline
  labels:
    app: outline
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: outline