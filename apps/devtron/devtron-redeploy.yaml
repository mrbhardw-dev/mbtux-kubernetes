devtron:
  ucid: 6ggohd7fbo9bzm9p

global:
  namespace: devtroncd
  installationType: ENTERPRISE

installer:
  module:
    ci: false              # enable later if needed
    cd: true
    argoCd: true
    security: true

cluster:
  installClusterAgent: true
  autoRegisterCluster: true        # ✅ auto-select current cluster
  defaultCluster:
    enabled: true                  # ✅ default cluster created

argoCd:
  enabled: true
  namespace: devtroncd

postgresql:
  enabled: false                   # ✅ REUSE existing DB (VERY IMPORTANT)

configs:
  override:
    ENABLE_CLUSTER_AUTH: "true"
    ENABLE_CI: "false"
    ENABLE_CD: "true"
    ENABLE_SECURITY: "true"
    ENABLE_ARGO_CD: "true"


namespaces:
  devtron: devtroncd
  argoCd: devtroncd
  ci: devtroncd
  cd: devtroncd
  dashboard: devtroncd
