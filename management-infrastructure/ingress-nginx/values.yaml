global:
  logging:
    format: json
    level: info

controller:
  replicaCount: 2

  image:
    digest: ""

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

  publishService:
    enabled: true
    path: /

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetAverageUtilization: 70

  ingressClassByName: true

  admissionWebhooks:
    enabled: true
    timeoutSeconds: 30

  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

  config:
    compute-full-forwarded-for: "true"
    use-forwarded-headers: "true"
    proxy-body-size: "50m"
    large-client-header-buffers: "4 16k"
    client-header-buffer-size: "4k"
    keep-alive: "75"
    keep-alive-requests: "1000"
    upstream-keepalive-connections: "1000"
    upstream-keepalive-requests: "1000"
    upstream-keepalive-timeout: "75"

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"
    prometheus.io/path: "/metrics"

  podLabels:
    app: ingress-nginx

admissionWebhooks:
  enabled: true
  timeoutSeconds: 30

defaultBackend:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 500m
      memory: 256Mi

patch:
  enabled: true