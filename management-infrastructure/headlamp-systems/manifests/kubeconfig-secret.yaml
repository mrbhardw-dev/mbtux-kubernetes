apiVersion: v1
kind: Secret
metadata:
  name: headlamp-kubeconfigs
  namespace: headlamp
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    clusters:
    - cluster:
        certificate-authority-data: 
        server: https://192.168.0.211:6443
      name: data-cluster
    - cluster:
        certificate-authority-data: 
        server: https://192.168.0.201:6443
      name: mgmt-cluster
    contexts:
    - context:
        cluster: data-cluster
        user: data-user
      name: mbtux-data-cluster
    - context:
        cluster: mgmt-cluster
        user: mgmt-admin
      name: mbtux-mgmt-cluster
    current-context: mbtux-mgmt-cluster
    kind: Config
    users:
    - name: data-user
      user:
        client-certificate-data: 
        client-key-data: 
    - name: mgmt-admin
      user:
        client-certificate-data: 
        client-key-data: 