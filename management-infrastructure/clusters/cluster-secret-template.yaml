apiVersion: v1
kind: Secret
metadata:
  name: cluster-{CLUSTER_NAME}
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
type: Opaque
stringData:
  name: {CLUSTER_NAME}
  server: {CLUSTER_SERVER}
  config: |
    {
      "bearerToken": "{BEARER_TOKEN}",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "{CA_DATA}"
      }
    }