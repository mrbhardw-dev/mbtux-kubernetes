apiVersion: v1
kind: Secret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-oidc-secret
    app.kubernetes.io/part-of: mbtux-platform
type: Opaque
stringData:
  # OIDC client ID from Authentik ArgoCD provider
  client-id: "<YOUR-ARGOCD-CLIENT-ID>"
  # OIDC client secret from Authentik ArgoCD provider
  client-secret: "<YOUR-ARGOCD-CLIENT-SECRET>"