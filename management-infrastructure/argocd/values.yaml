global:
  logging:
    format: json
    level: info

image:
  tag: v3.0.0

namespace: argocd

## ---------------------------------------------------------
## Argo CD Server
## ---------------------------------------------------------
server:
  replicas: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

  service:
    type: ClusterIP

  extraArgs:
    - --insecure=true

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: traefik
    hosts:
      - argocd.mbtux.com
    path: /
    tls: []

  metrics:
    enabled: false

## ---------------------------------------------------------
## Controller
## ---------------------------------------------------------
controller:
  replicas: 2

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

  metrics:
    enabled: false

## ---------------------------------------------------------
## Repo Server
## ---------------------------------------------------------
repoServer:
  replicas: 2

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 2
      memory: 2Gi

  metrics:
    enabled: false

## ---------------------------------------------------------
## ApplicationSet
## ---------------------------------------------------------
applicationSet:
  enabled: true
  replicas: 2

  metrics:
    enabled: false

## ---------------------------------------------------------
## Dex (SSO-ready)
## ---------------------------------------------------------
dex:
  enabled: true
  replicas: 2

## ---------------------------------------------------------
## Notifications
## ---------------------------------------------------------
notifications:
  enabled: true

## ---------------------------------------------------------
## Redis
## ---------------------------------------------------------
redis:
  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

## ---------------------------------------------------------
## HA Configuration
## ---------------------------------------------------------
ha:
  enabled: true
  redisProxyReplicas: 2