apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-mgmt-tls
  namespace: monitoring
spec:
  dnsNames:
    - prometheus.mgmt.mbtux.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: prometheus-mgmt-tls
  duration: 2160h
  renewBefore: 360h
