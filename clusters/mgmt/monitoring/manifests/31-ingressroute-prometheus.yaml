apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-traefik-headers@kubernetescrd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`prometheus.mgmt.mbtux.com`)
      priority: 10
      services:
        - name: prometheus
          port: 9090
  tls:
    secretName: prometheus-mgmt-tls
