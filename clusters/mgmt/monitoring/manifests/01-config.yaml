apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'mgmt-cluster'
    
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              cluster: 'mgmt-cluster'
              job: 'prometheus'
       
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
      
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - source_labels: [__meta_kubernetes_node_name]
            target_label: node
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'kubernetes-nodes'
            target_label: job
      
      - job_name: 'kubernetes-kubelet'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: replace
            source_labels: [__address__]
            regex: (:(\d+))
            replacement: ':10250'
            target_label: __address__
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
      
      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        metrics_path: /metrics/cadvisor
        relabel_configs:
          - action: replace
            source_labels: [__address__]
            regex: (:(\d+))
            replacement: ':10250'
            target_label: __address__
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
      
      - job_name: 'kube-state-metrics'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'kube-state-metrics'
            target_label: job
      
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            action: keep
            regex: node-exporter-.*
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'node-exporter'
            target_label: job
       
      - job_name: 'traefik'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: traefik
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "9000"
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
          - source_labels: [__address__]
            regex: (.+):\d+
            replacement: $1:9000
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'traefik'
            target_label: job
     
      - job_name: 'argocd-server-metrics'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: argocd-server
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8083"
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
          - source_labels: [__address__]
            regex: (.+):\d+
            replacement: $1:8083
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'argocd-server-metrics'
            target_label: job
     
      - job_name: 'argocd-metrics'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: argocd-application-controller
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8082"
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
          - source_labels: [__address__]
            regex: (.+):\d+
            replacement: $1:8082
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'argocd-metrics'
            target_label: job
     
      - job_name: 'argocd-repo-server'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: argocd-repo-server
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8084"
          - action: replace
            source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
          - source_labels: [__address__]
            regex: (.+):\d+
            replacement: $1:8084
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_namespace]
            target_label: namespace
          - action: replace
            replacement: 'mgmt-cluster'
            target_label: cluster
          - action: replace
            replacement: 'argocd-repo-server'
            target_label: job
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  GF_SERVER_ROOT_URL: "https://grafana.mbtux.com"
  GF_SERVER_SERVE_FROM_SUB_PATH: "false"
  GF_SERVER_HTTP_PORT: "3000"
  GF_DATABASE_TYPE: "sqlite3"
  GF_DATABASE_PATH: "/var/lib/grafana/grafana.db"
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ALLOW_SIGN_UP: "true"
  GF_USERS_ALLOW_SIGN_UP: "true"
  GF_INSTALL_PLUGINS: "grafana-piechart-panel"
  GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
  GF_AUTH_GENERIC_OAUTH_NAME: "authentik"
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${AUTHENTIK_CLIENT_SECRET}"
  GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
  GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://authentik.mbtux.com/application/o/authorize/"
  GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://authentik.mbtux.com/application/o/token/"
  GF_AUTH_GENERIC_OAUTH_API_URL: "https://authentik.mbtux.com/application/o/userinfo/"
  GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "groups"
  GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
  GF_AUTH_OAUTH2_AUTO_LOGIN: "false"
