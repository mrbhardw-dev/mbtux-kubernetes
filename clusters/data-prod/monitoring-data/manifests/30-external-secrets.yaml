apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: monitoring-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: monitoring-secrets
    creationPolicy: Owner
  data:
  - secretKey: grafana-password
    remoteRef:
      key: monitoring-secrets
      property: grafana-password
  - secretKey: prometheus-retention
    remoteRef:
      key: monitoring-secrets
      property: prometheus-retention
  - secretKey: authentik-client-secret
    remoteRef:
      key: monitoring-secrets
      property: authentik-client-secret
