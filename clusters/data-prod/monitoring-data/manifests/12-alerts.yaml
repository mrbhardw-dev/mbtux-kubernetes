apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alerts
  namespace: monitoring
data:
  alerts.yaml: |
    groups:
    - name: kubernetes_resources
      rules:
      - alert: KubePodNotReady
        expr: kube_pod_status_phase{phase="Running"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for more than 5 minutes"
      
      - alert: KubePodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last 5 minutes"
      
      - alert: KubeDeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} unavailable replicas"
      
      - alert: KubeStatefulSetReplicasMismatch
        expr: kube_statefulset_status_replicas != kube_statefulset_status_ready_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} replicas mismatch"
          description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has {{ $value }} unavailable replicas"
      
      - alert: KubeJobFailed
        expr: kube_job_failed == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Job {{ $labels.namespace }}/{{ $labels.job }} failed"
          description: "Job {{ $labels.namespace }}/{{ $labels.job }} has failed"

    - name: kubernetes_nodes
      rules:
      - alert: KubeNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="false"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 5 minutes"
      
      - alert: KubeNodeMemoryPressure
        expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} has memory pressure"
          description: "Node {{ $labels.node }} is under memory pressure"
      
      - alert: KubeNodeDiskPressure
        expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} has disk pressure"
          description: "Node {{ $labels.node }} is under disk pressure"

    - name: kubernetes_control_plane
      rules:
      - alert: KubeAPIServerDown
        expr: up{job="kubernetes-apiservers"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API Server is down"
          description: "API Server has been down for more than 1 minute"
      
      - alert: KubeControllerManagerDown
        expr: up{job="kube-state-metrics"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Controller Manager is down"
          description: "Controller Manager has been down for more than 5 minutes"

    - name: node_resources
      rules:
      - alert: NodeCPUHigh
        expr: 100 - (avg by (node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} CPU usage is high"
          description: "Node {{ $labels.node }} CPU usage is above 80% for 10 minutes"
      
      - alert: NodeMemoryHigh
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.node }} memory usage is high"
          description: "Node {{ $labels.node }} memory usage is above 80% for 10 minutes"
      
      - alert: NodeDiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.node }} disk space is critical"
          description: "Node {{ $labels.node }} has less than 10% disk space remaining"

    - name: traefik
      rules:
      - alert: TraefikDown
        expr: up{job="traefik"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Traefik is down on {{ $labels.cluster }}"
          description: "Traefik instance {{ $labels.pod }} on cluster {{ $labels.cluster }} has been down for more than 1 minute"
      - alert: TraefikHigh5xxRate
        expr: rate(traefik_service_requests_total{code=~"5.."}[5m]) / rate(traefik_service_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on Traefik"
          description: "Traefik 5xx error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

    - name: argocd
      rules:
      - alert: ArgoCDAppSyncFailed
        expr: increase(argocd_app_sync_total{phase=~"Error|Failed"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "ArgoCD sync failure"
          description: "ArgoCD application sync failed in namespace {{ $labels.namespace }}"
      - alert: ArgoCDAppMissing
        expr: argocd_app_info{health_status="Missing"} > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "ArgoCD application is missing"
          description: "ArgoCD application {{ $labels.name }} is in Missing health status"
      - alert: ArgoCDAppDegraded
        expr: argocd_app_info{health_status="Degraded"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "ArgoCD application is degraded"
          description: "ArgoCD application {{ $labels.name }} in {{ $labels.namespace }} is Degraded"

    - name: recording_rules
      rules:
      - record: cluster:node_cpu:sum_rate5m
        expr: sum(rate(node_cpu_seconds_total{mode!="idle"}[5m])) by (cluster)
      
      - record: cluster:node_memory:used_percent
        expr: 100 - (sum(node_memory_MemAvailable_bytes) by (cluster) / sum(node_memory_MemTotal_bytes) by (cluster)) * 100
      
      - record: cluster:pod_count:sum
        expr: sum(kube_pod_info) by (cluster)
      
      - record: namespace:pod_count:sum
        expr: sum(kube_pod_info) by (namespace)
      
      - record: namespace:deployment_replicas:desired:sum
        expr: sum(kube_deployment_spec_replicas) by (namespace)
      
      - record: namespace:deployment_replicas:available:sum
        expr: sum(kube_deployment_status_replicas_available) by (namespace)
      
      - record: workload:pod_restart_rate:5m
        expr: sum(rate(kube_pod_container_status_restarts_total[5m])) by (namespace, pod)