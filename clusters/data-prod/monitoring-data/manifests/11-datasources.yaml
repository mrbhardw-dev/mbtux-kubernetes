apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    
    datasources:
      - name: Prometheus (data-cluster)
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          httpMethod: GET
          timeInterval: 30s
      - name: Prometheus (mgmt-cluster)
        type: prometheus
        access: proxy
        url: https://prometheus.mgmt.mbtux.com
        editable: true
        jsonData:
          httpMethod: GET
          timeInterval: 30s

