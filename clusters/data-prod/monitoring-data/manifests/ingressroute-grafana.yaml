apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/api`))
      priority: 20
      services:
        - name: grafana
          port: 3000
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/login`) || PathPrefix(`/logout`) || PathPrefix(`/oauth2`) || PathPrefix(`/.well-known`))
      priority: 20
      services:
        - name: grafana
          port: 3000
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/`) || PathPrefix(`/dashboard`))
      priority: 10
      services:
        - name: grafana
          port: 3000
  tls:
    secretName: grafana-tls