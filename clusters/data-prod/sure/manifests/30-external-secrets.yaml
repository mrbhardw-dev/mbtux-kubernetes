apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sure-secrets
  namespace: sure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: sure-secrets
    creationPolicy: Owner
  data:
  - secretKey: SECRET_KEY_BASE
    remoteRef:
      key: sure-secrets
      property: SECRET_KEY_BASE
  - secretKey: secret-key-base
    remoteRef:
      key: sure-secrets
      property: secret-key-base
  - secretKey: postgres-user
    remoteRef:
      key: sure-secrets
      property: postgres-user
  - secretKey: postgres-password
    remoteRef:
      key: sure-secrets
      property: postgres-password
  - secretKey: smtp-host
    remoteRef:
      key: sure-secrets
      property: smtp-host
  - secretKey: smtp-port
    remoteRef:
      key: sure-secrets
      property: smtp-port
  - secretKey: smtp-tls-enabled
    remoteRef:
      key: sure-secrets
      property: smtp-tls-enabled
  - secretKey: smtp-username
    remoteRef:
      key: sure-secrets
      property: smtp-username
  - secretKey: smtp-password
    remoteRef:
      key: sure-secrets
      property: smtp-password
  - secretKey: email-sender
    remoteRef:
      key: sure-secrets
      property: email-sender
  - secretKey: OIDC_CLIENT_SECRET
    remoteRef:
      key: sure-secrets
      property: OIDC_CLIENT_SECRET
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-oidc-client
  namespace: sure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: authentik-oidc-client
    creationPolicy: Owner
  data:
  - secretKey: client-id
    remoteRef:
      key: sure-oidc
      property: client-id
  - secretKey: client-secret
    remoteRef:
      key: sure-oidc
      property: client-secret
