apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-data
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`prometheus.data.mbtux.com`)
      priority: 10
      services:
        - name: prometheus
          port: 9090
  tls:
    secretName: prometheus-data-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: prometheus-mgmt-tls
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  dnsNames:
    - prometheus.mgmt.mbtux.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  secretName: prometheus-mgmt-tls
  duration: 2160h
  renewBefore: 360h
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus-mgmt
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`prometheus.mgmt.mbtux.com`)
      priority: 10
      services:
        - name: prometheus
          port: 9090
  tls:
    secretName: prometheus-mgmt-tls
