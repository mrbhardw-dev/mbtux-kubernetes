apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.mbtux.com`)
      priority: 10
      services:
        - name: grafana
          port: 3000
  tls:
    secretName: grafana-tls
