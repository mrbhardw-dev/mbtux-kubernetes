apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: grafana-oidc-auth
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  plugin:
    traefik-oidc-auth:
      Secret: urn:k8s:secret:traefik-authentik-oidc:session-secret
      Provider:
        Url: https://authentik.mbtux.com/application/o/authorize/
        ClientId: urn:k8s:secret:traefik-authentik-oidc:client-id
        ClientSecret: urn:k8s:secret:traefik-authentik-oidc:client-secret
      Scopes:
        - openid
        - profile
        - email
      AuthPath: /oauth2/auth
      CallBackPath: /oauth2/callback
      PostAuthPath: /oauth2/userinfo
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    fleet.cattle.io/managed: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/api`))
      priority: 20
      services:
        - name: grafana
          port: 3000
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/login`) || PathPrefix(`/logout`) || PathPrefix(`/oauth2`) || PathPrefix(`/.well-known`))
      priority: 20
      services:
        - name: grafana
          port: 3000
    - kind: Rule
      match: Host(`grafana.mbtux.com`) && (PathPrefix(`/`) || PathPrefix(`/dashboard`))
      priority: 10
      middlewares:
        - name: grafana-oidc-auth
          namespace: monitoring
      services:
        - name: grafana
          port: 3000
  tls:
    secretName: grafana-tls