apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sure-worker
  namespace: sure
  labels:
    app: sure-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sure-worker
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sure-worker-pdb
  namespace: sure
  labels:
    app: sure-worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sure-worker