apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coder
  namespace: coder
  labels:
    app: coder
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coder
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coder-pdb
  namespace: coder
  labels:
    app: coder
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: coder
