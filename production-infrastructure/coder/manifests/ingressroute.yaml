apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: coder
  namespace: coder
spec:
  entryPoints:
    - websecure
  routes:
  # Main application route
  - kind: Rule
    match: Host(`coder.mbtux.com`) && PathPrefix(`/`)
    services:
    - name: coder
      port: 80
  # Workspace wildcard route (for dev URLs like user-project-workspace.coder.mbtux.com)
  - kind: Rule
    match: Host(`*.coder.mbtux.com`) && PathPrefix(`/`)
    services:
    - name: coder
      port: 80
  tls:
    secretName: tls-coder
