apiVersion: v1
kind: ConfigMap
metadata:
  name: coder-auth
  namespace: coder
data:
  # OIDC/Authentik configuration
  # After creating OIDC provider in Authentik, update AUTH_OIDC_CLIENT_ID below
  AUTH_ENABLED: "true"
  AUTH_OIDC_ISSUER_URL: "https://authentik.mbtux.com/application/o/coder/"
  AUTH_OIDC_CLIENT_ID: "PLACEHOLDER_REPLACE_WITH_AUTHENTIK_CLIENT_ID"
  AUTH_OIDC_SCOPES: "openid profile email"
  AUTH_OIDC_USERNAME_CLAIM: "preferred_username"
  AUTH_OIDC_DISPLAY_NAME: "Authentik"
  AUTH_OIDC_CREATE_USERS: "false"
  AUTH_OIDC_EMAIL_DOMAIN: ""
  AUTH_OIDC_SKIP_ISSUER_VERIFICATION: "false"
