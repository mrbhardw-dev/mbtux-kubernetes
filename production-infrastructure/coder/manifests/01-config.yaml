apiVersion: v1
kind: ConfigMap
metadata:
  name: coder-config
  namespace: coder
data:
  # Coder core settings
  CODER_ACCESS_URL: "https://coder.mbtux.com"
  CODER_WILDCARD_ACCESS_URL: "*.coder.mbtux.com"
  CODER_LOG_LEVEL: "info"
  CODER_ENABLE_USER_AUTOSTART: "true"
  CODER_MAX_TOKEN_LIFETIME: "720h"
  CODER_METRICS_ENABLE: "true"
  CODER_PROMETHEUS_ENABLE: "true"
  CODER_DEVREL_ENABLE: "false"
  
  # Database settings (non-sensitive)
  POSTGRES_HOST: "coder-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "coder"
  POSTGRES_DB: "coder"
  POSTGRES_SSL_MODE: "disable"
  
  # Redis (optional - not configured by default)
  REDIS_HOST: ""
  REDIS_PORT: ""
  
  # Proxy settings
  CODER_PROXY_HTTPS_PORT: "443"
  CODER_PROXY_IDLE_TIMEOUT: "1h"
  
  # Resource management
  CODER_MAX_WORKSPACE_AUTOSTART: "5"
  CODER_MAX_WORKSPACE_AUTOSTOP: "5"

