apiVersion: v1
kind: Service
metadata:
  name: coder
  namespace: coder
  labels:
    app: coder
spec:
  type: ClusterIP
  selector:
    app: coder
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: coder-pvc
  namespace: coder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: coder
  namespace: coder
rules:
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: coder
  namespace: coder
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: coder
subjects:
  - kind: ServiceAccount
    name: coder
    namespace: coder
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder
  namespace: coder
  labels:
    app: coder
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: coder
  template:
    metadata:
      labels:
        app: coder
    spec:
      serviceAccountName: coder
      terminationGracePeriodSeconds: 30
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z coder-postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
      - name: coder
        image: ghcr.io/coder/coder:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        startupProbe:
          httpGet:
            path: /api/v2/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
        livenessProbe:
          httpGet:
            path: /api/v2/health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v2/health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
         envFrom:
         - configMapRef:
             name: coder-config
         - configMapRef:
             name: coder-auth
         
         env:
         # Database password from secret
         - name: POSTGRES_PASSWORD
           valueFrom:
             secretKeyRef:
               name: coder-secrets
               key: postgres-password
         
         # OIDC client secret from OIDC-specific secret (not coder-secrets)
         - name: AUTH_OIDC_CLIENT_SECRET
           valueFrom:
             secretKeyRef:
               name: authentik-oidc-client
               key: client-secret
         
         # Access URL
         - name: CODER_ACCESS_URL
           value: "https://coder.mbtux.com"
         
         # Workspace storage
         - name: CODER_WORKSPACE_DIR
           value: "/home/coder"
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        
        volumeMounts:
        - name: coder-storage
          mountPath: /home/coder
        - name: tmp
          mountPath: /tmp
      
      volumes:
      - name: coder-storage
        persistentVolumeClaim:
          claimName: coder-pvc
      - name: tmp
        emptyDir: {}
