global:
  fullnameOverride: authentik

authentik:
  secret_key: "e0a66085992a094ef36a2a7dc73f149d66d5bd4f71fe687414279f4a34b4e4b7"
  admin_password: "Inf0rm@tics@123"
  postgresql:
    host: "authentik-postgresql"
    port: 5432
    name: authentik_db
    user: authentik_user
    password: authentik_pass
  redis:
    host: redis
    port: 6379
  browse_url: "https://authentik.mbtux.com"
  error_reporting:
    enabled: false

postgresql:
  enabled: true
  auth:
    username: authentik_user
    password: authentik_pass
    database: authentik_db
  primary:
    persistence:
      enabled: true
      size: 20Gi
    configuration: |
      listen_addresses = '*'
      port = '5432'
      wal_level = 'replica'
      fsync = 'on'
      hot_standby = 'on'
      log_connections = 'false'
      log_disconnections = 'false'
      log_hostname = 'false'
      client_min_messages = 'error'
      include_dir = 'conf.d'
    pgHbaConfiguration: |
      host     all             all             0.0.0.0/0               scram-sha-256
      host     all             all             ::/0                    scram-sha-256

server:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: false

worker:
  replicas: 1
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

serviceAccount:
  create: true
