apiVersion: v1
kind: Secret
metadata:
  name: authentik
  namespace: authentik
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: "GENERATE_WITH_openssl_rand_base64_50_OR_MORE_CHARS"
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_POSTGRES__HOST: postgresql
  AUTHENTIK_POSTGRES__PORT: "5432"
  AUTHENTIK_POSTGRES__USER: authentik
  AUTHENTIK_POSTGRES__PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  AUTHENTIK_POSTGRES__DATABASE: authentik
  AUTHENTIK_REDIS__HOST: redis
  AUTHENTIK_REDIS__PORT: "6379"
  AUTHENTIK_REDIS__CACHE__HOST: redis
  AUTHENTIK_REDIS__CACHE__PORT: "6379"
