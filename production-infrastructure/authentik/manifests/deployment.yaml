apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik
  namespace: authentik
  labels:
    app: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik
  template:
    metadata:
      labels:
        app: authentik
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2024.10.5
          imagePullPolicy: IfNotPresent
          env:
            - name: AUTHENTIK_REDIS__HOST
              value: redis
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: postgresql
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              value: authentik123
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secretKey
          ports:
            - name: http
              containerPort: 9000
            - name: https
              containerPort: 9443
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: authentik
spec:
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: https
      port: 9443
      targetPort: 9443
      protocol: TCP
  selector:
    app: authentik
