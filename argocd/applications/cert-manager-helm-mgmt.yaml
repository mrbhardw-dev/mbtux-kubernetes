apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-helm-mgmt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: 1.20.2
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
  destination:
    name: mgmt-cluster
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
