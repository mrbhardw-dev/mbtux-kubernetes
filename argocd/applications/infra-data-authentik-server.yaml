apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-data-authentik-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: mbtux-kubernetes
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: infrastructure/authentik
    helm:
      releaseName: authentik
      valueFiles:
        - values.yaml
  destination:
    server: https://192.168.0.211:6443
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
