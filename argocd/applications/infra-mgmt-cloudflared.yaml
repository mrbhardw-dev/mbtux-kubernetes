apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-mgmt-cloudflared
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: mbtux-kubernetes
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: management/cloudflared-mgmt/manifests
  destination:
    server: https://192.168.0.201:6443
    namespace: cloudflared-mgmt
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
