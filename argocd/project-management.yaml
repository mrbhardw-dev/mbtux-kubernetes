apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: management
  namespace: argocd
spec:
  description: Management Cluster Applications
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  sourceRepos:
    - https://github.com/mrbhardw-dev/mbtux-kubernetes.git
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"