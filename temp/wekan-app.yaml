apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wekan
  namespace: argocd
  labels:
    app.kubernetes.io/name: wekan
    app.kubernetes.io/part-of: collaboration
    cluster: data
spec:
  project: data-cluster
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes
    targetRevision: main
    path: apps/wekan
  destination:
    server: https://kubernetes.default.svc
    namespace: wekan
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m