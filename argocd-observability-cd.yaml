---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mrbhardw-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:mrbhardw-dev/ArgoCD.git
    targetRevision: HEAD
    path: observability/135/prometheus-operator-crd
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=truedefault
