apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik-ingressroute
  namespace: authentik
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: Host(`authentik.mbtux.com`)
    services:
    - name: authentik-server
      port: 80
    middlewares:
    - name: security-headers
    - name: compress
  tls:
    options:
      name: secure-default
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: authentik
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    customFrameOptionsValue: "SAMEORIGIN"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: compress
  namespace: authentik
spec:
  compress:
    defaultEncoding: gzip