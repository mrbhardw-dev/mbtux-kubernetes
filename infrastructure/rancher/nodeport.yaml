# Rancher NodePort Service for direct access
---
apiVersion: v1
kind: Service
metadata:
  name: rancher-nodeport
  namespace: cattle-system
  labels:
    app: rancher
    app.kubernetes.io/name: rancher
    app.kubernetes.io/part-of: rancher
    cluster: mgmt
  annotations:
    description: "NodePort service for direct Rancher access"
spec:
  type: NodePort
  selector:
    app: rancher
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
      protocol: TCP
