defaultNamespace: cattle-system
name: rancher
helm:
  repo: https://releases.rancher.com/server-charts/stable
  chart: rancher
  version: 2.14.0
  values:
    hostname: rancher.mbtux.com
    replicas: 3
    bootstrapPassword: "nFtMpT^z!1B&la^WDiBd"
    tls: external
    ingress:
      enabled: true
      ingressClassName: nginx
      extraAnnotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    noAntiAffinity: "true"
    auditLevel: 0
    debug: false
    privateCA: false
