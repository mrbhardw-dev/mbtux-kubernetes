# Data Cluster Import Registration
# This creates the cluster entry in Rancher. After applying, you must
# run the import command on the data cluster to install the Rancher agent.
---
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: data-cluster
  namespace: fleet-default
  labels:
    cluster: data
    environment: production
    data: "true"
  annotations:
    description: "Data cluster for application workloads"
spec: {}
---
# Fleet Cluster Group for targeting GitRepos
apiVersion: fleet.cattle.io/v1alpha1
kind: ClusterGroup
metadata:
  name: data-cluster-group
  namespace: fleet-default
  labels:
    cluster: data
    environment: production
spec:
  selector:
    matchLabels:
      cluster: data
