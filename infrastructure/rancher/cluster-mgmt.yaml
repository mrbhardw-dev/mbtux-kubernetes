# Management Cluster Registration
---
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: mgmt-cluster
  namespace: fleet-default
  labels:
    cluster: mgmt
    environment: production
    management: "true"
  annotations:
    description: "Management cluster for infrastructure services"
spec:
  kubernetesVersion: "v1.31.14"
  rkeConfig:
    machinePools:
      - name: mgmt-master
        controlPlaneRole:
          - controlplane
        etcdRole:
          - etcd
        workerRole:
          - worker
        quantity: 1
        machineConfigRef:
          kind: VMwareCloudProviderConfig
          name: mgmt-master-config
    chartValues:
      rke2-coredns:
        global:
          coredns:
            image:
              tag: "1.11.3"
    machineSelectorConfig:
      - config:
          kubelet-arg:
            - "max-pods=110"
            - "image-gc-high-threshold=85"
            - "image-gc-low-threshold=80"
          kube-apiserver-arg:
            - "enable-admission-plugins=NodeRestriction,PodSecurity"
          kube-controller-manager-arg:
            - "terminated-pod-gc-threshold=100"
          kube-proxy-arg:
            - "proxy-mode=ipvs"
---
# Fleet Cluster Registration
apiVersion: fleet.cattle.io/v1alpha1
kind: Cluster
metadata:
  name: mgmt-cluster
  namespace: fleet-default
  labels:
    cluster: mgmt
    environment: production
    management: "true"
  annotations:
    description: "Management cluster for infrastructure services"
spec:
  clientID: "mgmt-cluster"
  agentNamespace: "cattle-fleet-system"
---
# Fleet Cluster Group
apiVersion: fleet.cattle.io/v1alpha1
kind: ClusterGroup
metadata:
  name: mgmt-cluster-group
  namespace: fleet-default
  labels:
    cluster: mgmt
    environment: production
spec:
  selector:
    matchLabels:
      cluster: mgmt
---
# Rancher Cluster Registration Token
apiVersion: management.cattle.io/v3
kind: ClusterRegistrationToken
metadata:
  name: mgmt-cluster-token
  namespace: fleet-default
  labels:
    cluster: mgmt
spec:
  clusterName: "mgmt-cluster"
---
# Fleet Agent Bundle
apiVersion: fleet.cattle.io/v1alpha1
kind: Bundle
metadata:
  name: mgmt-fleet-agent
  namespace: fleet-default
  labels:
    cluster: mgmt
spec:
  namespace: cattle-fleet-system
  rolloutStrategy:
    maxUnavailable: 0
    maxUnavailablePartitions: 0
  resources:
    - content: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: fleet-agent
          namespace: cattle-fleet-system
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: fleet-agent
          template:
            metadata:
              labels:
                app: fleet-agent
            spec:
          containers:
            - name: fleet-agent
              image: rancher/fleet-agent:v0.12.0
              env:
                - name: CLUSTER_ID
                  value: "mgmt-cluster"
                - name: CLUSTER_NAMESPACE
                  value: "fleet-default"
