apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher-mgmt
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mrbhardw/mbtux-kubernetes.git
    targetRevision: HEAD
    path: infrastructure/rancher
    helm:
      valueFiles:
        - values.yaml
  destination:
    name: mgmt
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true