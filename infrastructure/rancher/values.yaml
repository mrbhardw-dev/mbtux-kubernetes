hostname: rancher.mbtux.com
replicas: 1

bootstrapPassword: "nFtMpT^z!1B&la^WDiBd"

tls: external

ingress:
  enabled: true
  ingressClassName: nginx
  extraAnnotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

service:
  type: ClusterIP

# Fleet configuration
fleet:
  agentImage: ""
  agentImagePullPolicy: IfNotPresent

# Resource limits for single-node management cluster
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Anti-affinity not needed on single node
noAntiAffinity: "true"

# Audit log level
auditLevel: 0

# Debug logging off for production
debug: false

# Use letsencrypt for internal TLS if needed
privateCA: false

# Feature flags
features: ""

# Cluster provisioning
extraEnv:
  - name: CATTLE_ANNOTATIONS_NAMESPACE
    value: "cattle-system"
  - name: CATTLE_CLUSTER_REGISTRATION
    value: "true"

# Agent configuration
agent:
  image:
    tag: ""
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

# Rancher server URL
rancherUrl: "https://rancher.mbtux.com"

# Cluster configuration for managed clusters
clusters:
  mgmt:
    name: "mgmt-cluster"
    displayName: "Management Cluster"
    description: "Management cluster for infrastructure services"
    labels:
      cluster: mgmt
      environment: production
    annotations:
      management: "true"
    enableNetworkPolicy: false
    enableClusterAlerting: true
    enableClusterMonitoring: true
  data:
    name: "data-cluster"
    displayName: "Data Cluster"
    description: "Data cluster for application workloads"
    labels:
      cluster: data
      environment: production
    annotations:
      data: "true"
    enableNetworkPolicy: false
    enableClusterAlerting: true
    enableClusterMonitoring: true
