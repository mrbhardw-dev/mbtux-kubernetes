apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: fleet-mgmt
  namespace: fleet-mgmt
  labels:
    app: mbtux-kubernetes
    environment: production
    cluster: mgmt
  annotations:
    description: "MBTUX Kubernetes - Management cluster FleetCD configuration"
spec:
  repo: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
  branch: main
  pollingInterval: 60s
  insecureSkipTLSVerify: false
  clientSecretName: git-http-basic-auth
  correctDrift:
    enabled: true
    force: false
    keepFailHistory: true
  keepResources: false
  deleteNamespace: false
  paths:
    - infrastructure/rancher
    - infrastructure/cloudflared-mgmt
  targets:
    - name: mgmt-cluster
      clusterName: local
