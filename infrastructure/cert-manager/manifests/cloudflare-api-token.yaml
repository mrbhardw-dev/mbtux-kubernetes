apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: CHANGEME_CLOUDFLARE_API_TOKEN
---
# Issuer for STAGING (Let's Encrypt staging API) - For testing
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: mritunjay.bhardwaj@outlook.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            email: mritunjay.bhardwaj@outlook.com
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# Issuer for PRODUCTION (Let's Encrypt production API)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: mritunjay.bhardwaj@outlook.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            email: mritunjay.bhardwaj@outlook.com
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token