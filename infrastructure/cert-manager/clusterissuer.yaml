# Cert-Manager ClusterIssuer for Let's Encrypt with HTTP01 challenge
# This ClusterIssuer will be used for all TLS certificates in the cluster
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app: cert-manager
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/part-of: cert-manager
spec:
  acme:
    # Let's Encrypt production server
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@mbtux.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      # HTTP01 challenge solver
      - http01:
          ingress:
            class: nginx
        selector: {}
