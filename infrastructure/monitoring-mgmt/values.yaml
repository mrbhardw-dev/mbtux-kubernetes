kube-prometheus-stack:
  # Disable default Grafana deployment (you have a standalone instance)
  grafana:
    enabled: false

  # Prometheus configuration - Management cluster (Hub)
  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 15d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

      # Enable Remote Write Receiver to accept metrics from Data cluster
      enableRemoteWriteReceiver: true

      # External label to identify this cluster
      externalLabels:
        cluster: mgmt-cluster

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
            # Uncomment if you have a StorageClass available
            # storageClassName: proxmox-csi

      # Service configuration
      service:
        type: ClusterIP

  # Node Exporter
  nodeExporter:
    enabled: true

  # kube-state-metrics
  kubeStateMetrics:
    enabled: true

  # Alertmanager - disable if not needed yet
  alertmanager:
    enabled: false

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # CoreDNS, kubelet, kube-api-server, etc. scrape configs (kube-prometheus-stack defaults)
  # These will auto-discover and scrape Kubernetes system components
