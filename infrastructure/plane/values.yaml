planeVersion: stable

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: plane.mbtux.com
      paths:
        - path: /
          pathType: Prefix
          service:
            name: plane-web
            port: 80
        - path: /api
          pathType: Prefix
          service:
            name: plane-api
            port: 8000
  tls:
    - secretName: plane-tls
      hosts:
        - plane.mbtux.com

services:
  postgres:
    local_setup: true
    storage: 20Gi
  redis:
    local_setup: true
    storage: 5Gi
  minio:
    local_setup: true
    storage: 10Gi

api:
  image: makeplane/plane-backend:stable
  env:
    - name: WEB_URL
      value: "https://plane.mbtux.com"
    - name: DEBUG
      value: "false"
    - name: ENABLE_TELEMETRY
      value: "false"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

web:
  image: makeplane/plane-frontend:stable
  env:
    - name: NEXT_PUBLIC_API_BASE_URL
      value: "https://plane.mbtux.com/api/v1"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

worker:
  image: makeplane/plane-backend:stable
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi