planeVersion: stable

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  hosts:
    - host: plane.mbtux.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: plane-tls
      hosts:
        - plane.mbtux.com

services:
  postgres:
    local_setup: true
  redis:
    local_setup: true
  minio:
    local_setup: true