apiVersion: v1
kind: Namespace
metadata:
  name: plane
  labels:
    app: plane
---
apiVersion: v1
kind: Service
metadata:
  name: plane-ingress
  namespace: plane
  labels:
    app: plane
spec:
  type: ClusterIP
  selector:
    app: plane
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  - port: 8080
    targetPort: 8000
    protocol: TCP
    name: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plane-ingress
  namespace: plane
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - host: plane.mbtux.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: plane-ingress
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: plane-ingress
            port:
              number: 80
  tls:
  - hosts:
    - plane.mbtux.com
    secretName: plane-tls