apiVersion: v1
kind: Service
metadata:
  name: outline
  namespace: outline
  labels:
    app: outline
spec:
  type: ClusterIP
  selector:
    app: outline
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: outline-pvc
  namespace: outline
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: outline
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: outline
  template:
    metadata:
      labels:
        app: outline
    spec:
      serviceAccountName: outline
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z outline-postgres 5432; do echo waiting for postgres; sleep 2; done;']
      - name: db-migrate
        image: getoutline/outline:latest
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: NODE_ENV
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: outline-secrets
              key: postgres-password
        - name: URL
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: URL
        - name: SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: SECRET_KEY
        - name: UTILS_SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: UTILS_SECRET_KEY
        command: ["yarn", "db:migrate"]
      containers:
      - name: outline
        image: getoutline/outline:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: NODE_ENV
        - name: FORCE_HTTPS
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: FORCE_HTTPS
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: LOG_LEVEL
        - name: URL
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: URL
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: outline-secrets
              key: postgres-password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: REDIS_PORT
        - name: SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: SECRET_KEY
        - name: UTILS_SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: UTILS_SECRET_KEY
        - name: FILE_STORAGE
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: FILE_STORAGE
        - name: FILE_STORAGE_LOCAL_ROOT_DIR
          valueFrom:
            configMapKeyRef:
              name: outline-config
              key: FILE_STORAGE_LOCAL_ROOT_DIR
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        volumeMounts:
        - name: outline-storage
          mountPath: /data/uploads
      volumes:
      - name: outline-storage
        persistentVolumeClaim:
          claimName: outline-pvc