# Outline configuration
name: outline
fullnameOverride: outline

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/acme-challenge-type: http01
  hosts:
    - host: outline.mbtux.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: outline-tls
      hosts:
        - outline.mbtux.com

# Database configuration
database:
  host: postgresgresql
  username: outline
  # DATABASE_URL set via secret

# Redis configuration  
redis:
  enabled: true

# Secrets
secret:
  # SECRET_KEY set via secret
  # DATABASE_URL set via secret
  # REDIS_URL set via secret