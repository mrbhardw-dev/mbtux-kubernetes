apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared-data
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
          - tunnel
          - --no-autoupdate
          - run
          - --token
          - $(TUNNEL_TOKEN)
          - --protocol
          - quic
          - --ingress-rule
          - "hostname=argocd.mbtux.com service=http://server.argocd.svc.cluster.local:80"
          - --ingress-rule
          - "hostname=auth.mbtux.com service=http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80"
          - --ingress-rule
          - "hostname=codecombat.mbtux.com service=http://codecombat.codecombat.svc.cluster.local:80"

        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
