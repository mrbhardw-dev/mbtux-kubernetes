apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared-data
data:
  config.yaml: |
    tunnel: cloudflared-tunnel
    ingress:
      - hostname: argocd.mbtux.com
        service: http://server.argocd.svc.cluster.local:80
      - hostname: auth.mbtux.com
        service: http://10.43.86.136:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared-data
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:2024.8.0
        args:
          - tunnel
          - --no-autoupdate
          - run
          - --token
          - $(TUNNEL_TOKEN)
          - --protocol
          - quic
          - --config
          - /etc/cloudflared/config/config.yaml

        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN

        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
          readOnly: true

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi

      volumes:
      - name: config
        configMap:
          name: cloudflared-config