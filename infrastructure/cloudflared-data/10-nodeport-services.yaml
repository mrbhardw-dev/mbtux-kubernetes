---
apiVersion: v1
kind: Service
metadata:
  name: argocd-nodeport
  namespace: argocd
  labels:
    app: argocd
    app.kubernetes.io/name: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
