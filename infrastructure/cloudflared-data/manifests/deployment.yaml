apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared-data
  labels:
    app: cloudflared
    fleet.cattle.io/managed: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
          - tunnel
          - run
          - --token
          - $(TUNNEL_TOKEN)
          - --ingress-rule
          - hostname=grafana.mbtux.com originRequest.noTLSVerify=true service=http://grafana.monitoring.svc.cluster.local:3000
          - --ingress-rule
          - hostname=prometheus.data.mbtux.com originRequest.noTLSVerify=true service=http://prometheus.monitoring.svc.cluster.local:9090
          - --ingress-rule
          - hostname=authentik.mbtux.com originRequest.noTLSVerify=true service=http://authentik.authentik.svc.cluster.local:9000
          - --ingress-rule
          - hostname=outline.mbtux.com originRequest.noTLSVerify=true service=http://outline.outline.svc.cluster.local:3000
          - --ingress-rule
          - hostname=sure.mbtux.com originRequest.noTLSVerify=true service=http://sure.sure.svc.cluster.local:80
          - --ingress-rule
          - service=http://nginx-ingress-release-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi