apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared-data
data:
  config.yaml: |
    ingress:
      - hostname: outline.mbtux.com
        service: http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          connectTimeout: 30s
          tlsSkipVerify: false
      - hostname: authentik.mbtux.com
        service: http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          connectTimeout: 30s
          tlsSkipVerify: false
      - hostname: sure.mbtux.com
        service: http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          connectTimeout: 30s
          tlsSkipVerify: false
      - hostname: grafana.mbtux.com
        service: http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          connectTimeout: 30s
          tlsSkipVerify: false
      - hostname: rancher.mbtux.com
        service: http://nginx-ingress-ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
        originRequest:
          connectTimeout: 30s
          tlsSkipVerify: false
      - service: http_status:404
    
    logLevel: info
    transport-loglevel: warn
    
    metrics: 0.0.0.0:9090
    
    healthcheck:
      timeout: 5s
      interval: 30s
      retry: 5