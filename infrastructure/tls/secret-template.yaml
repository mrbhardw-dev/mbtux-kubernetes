apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-origin-cert
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/component: controller
  annotations:
    description: "TLS secret for Cloudflare Origin CA. Update cert and key values for rotation."
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
