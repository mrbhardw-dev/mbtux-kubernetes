# Vault PKI Setup for Internal mTLS
# This configures Vault's internal PKI engine for service-to-service encryption
# NOTE: These certificates are NOT trusted by browsers or public clients
# They are for internal Kubernetes service communication only

apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-pki-setup
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
data:
  pki-setup.sh: |
    #!/bin/bash
    set -e

    # Wait for Vault to be ready
    sleep 5

    # Enable PKI secrets engine
    vault secrets enable -path=pki pki

    # Tune the PKI mount for longer TTL
    vault secrets tune -max-lease-ttl=87600h pki

    # Generate root CA (valid for 10 years = 87600h)
    vault write -field=certificate pki/root/general/common_name="Vault Internal Root CA" \
      ttl=87600h generate_root=true

    # Configure CRL and URLs
    vault write pki/config/urls \
      issuing_certificates="http://vault.vault.svc:8200/v1/pki/ca" \
      crl_distribution_points="http://vault.vault.svc:8200/v1/pki/crl"

    # Enable intermediate PKI (for service certificates)
    vault secrets enable -path=pki-int pki

    # Generate intermediate CSR
    vault write -format=json pki-int/intermediate/generate/internal \
      common_name="Vault Intermediate CA" \
      | jq -r '.data.csr' > pki-intermediate.csr

    # Sign the intermediate CSR with root CA
    vault write -format=json pki/root/sign-intermediate csr=@pki-intermediate.csr \
      ttl=43800h format=pem_bundle \
      | jq -r '.data.certificate' > intermediate.crt

    # Set the intermediate certificate in Vault
    vault write pki-int/intermediate/set-signed certificate=@intermediate.crt

    # Cleanup temp files
    rm -f pki-intermediate.csr intermediate.crt

    # Create role for Kubernetes service certificates
    vault write pki-int/roles/k8s-service \
      allowed_domains="mbtux.com,svc.cluster.local" \
      allow_subdomains=true \
      allow_wildcardCertificates=true \
      max_ttl=720h \
      ttl=24h

    # Create example service certificate (for reference)
    # vault write pki-int/issue/k8s-service common_name="test-service.mbtux.svc" ttl=24h

    echo "Vault PKI configured successfully"
---
apiVersion: v1
kind: Pod
metadata:
  name: vault-pki-init
  namespace: vault
spec:
  restartPolicy: OnFailure
  serviceAccountName: vault
  containers:
    - name: pki-setup
      image: hashicorp/vault:1.21.4
      command:
        - /bin/sh
        - -c
        - |
          # Get Vault token from mounted secret
          export VAULT_TOKEN="$(cat /vault/secrets/token)"
          export VAULT_ADDR="http://vault:8200"

          # Wait for Vault to be initialized and unsealed
          for i in {1..30}; do
            if vault status 2>/dev/null | grep -q "Sealed.*false"; then
              break
            fi
            sleep 2
          done

          # Run PKI setup
          /bin/sh /vault/pki-setup.sh
      env:
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: vault-token
              key: token
        - name: VAULT_ADDR
          value: "http://vault:8200"
      volumeMounts:
        - name: scripts
          mountPath: /vault/pki-setup.sh
          subPath: pki-setup.sh
  volumes:
    - name: scripts
      configMap:
        name: vault-pki-setup
        defaultMode: 0755