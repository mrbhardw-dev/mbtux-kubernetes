defaultNamespace: ingress-nginx
kustomize:
  dir: ./manifests
  labels:
    fleet.cattle.io/managed: "true"
helm:
  releaseName: nginx-ingress-release
  chart: ingress-nginx
  repo: https://kubernetes.github.io/ingress-nginx
  version: 4.10.0
  valuesFile: values.yaml
target:
  clusterSelector:
    matchExpressions:
    - key: provider.cattle.io
      operator: NotIn
      values:
      - harvester