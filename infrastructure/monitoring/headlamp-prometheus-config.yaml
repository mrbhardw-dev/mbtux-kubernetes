# Headlamp Prometheus Plugin Configuration
# This ConfigMap configures Headlamp to connect to Prometheus for metrics viewing
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: monitoring
data:
  config.json: |
    {
      "prometheus": {
        "url": "http://192.168.0.201:32631",
        "serviceAddress": "monitoring/prometheus-http:9090",
        "queryRangeDuration": "1h",
        "maxSamples": 10000,
        "cacheEnabled": true,
        "cacheInterval": "5m"
      }
    }
