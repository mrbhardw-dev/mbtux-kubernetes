# Headlamp Prometheus Plugin Configuration
# This ConfigMap configures Headlamp to connect to Prometheus for metrics viewing
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: headlamp
    app.kubernetes.io/part-of: monitoring
data:
  config.json: |
    {
      "prometheus": {
        "clusters": [
          {
            "cluster": "mgmt-context",
            "url": "http://192.168.0.201:30090",
            "serviceAddress": "monitoring/prometheus-service:9090"
          },
          {
            "cluster": "data-context",
            "url": "http://192.168.0.211:30090",
            "serviceAddress": "monitoring/prometheus-service:9090"
          }
        ],
        "queryRangeDuration": "1h",
        "maxSamples": 10000,
        "cacheEnabled": true,
        "cacheInterval": "5m"
      }
    }
