apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-external
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/NodeHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        cache 30
        loop
        reload
        loadbalance
    }
    
    # Fix for Cloudflare Tunnel DNS
    # Forward *.argotunnel.com to Cloudflare DNS
    argotunnel.com:53 {
        forward . 1.1.1.1 1.0.0.1
        cache 60
    }
    
    v2.argotunnel.com:53 {
        forward . 1.1.1.1 1.0.0.1
        cache 60
    }
