apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources:
  - namespace.yaml
  - secret.yaml
  - storageclass.yaml

helmCharts:
  - name: proxmox-csi-plugin
    repo: https://sergelogvinov.github.io/proxmox-csi-plugin
    releaseName: proxmox-csi
    namespace: kube-system
    version: 0.3.0
    valuesFile: values.yaml