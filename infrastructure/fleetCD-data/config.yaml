apiVersion: fleet.cattle.io/v1alpha1
kind: GitRepo
metadata:
  name: fleet-data
  namespace: fleet-data
  labels:
    app: mbtux-kubernetes
    environment: production
    cluster: data
  annotations:
    description: "MBTUX Kubernetes - Data cluster FleetCD configuration"
spec:
  repo: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
  branch: main
  pollingInterval: 60s
  insecureSkipTLSVerify: false
  clientSecretName: git-http-basic-auth
  correctDrift:
    enabled: true
    force: false
    keepFailHistory: true
  keepResources: false
  deleteNamespace: false
  paths:
    - infrastructure/cloudflared-data
  targets:
    - name: data-cluster
      clusterSelector:
        matchLabels:
          cluster: data
