# RBAC for Longhorn CSI Driver Management
# Allows longhorn-service-account to manage CSIDriver resources
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-csidriver-role
rules:
- apiGroups: ["storage.k8s.io"]
  resources: ["csidrivers"]
  verbs: ["get", "create", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-csidriver-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-csidriver-role
subjects:
- kind: ServiceAccount
  name: longhorn-service-account
  namespace: longhorn-system
