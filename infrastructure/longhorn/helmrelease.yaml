# Longhorn HelmRelease
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.7.2
    helm:
      valueFiles:
        - $values/mbtux-kubernetes/infrastructure/longhorn/values.yaml
  sources:
    - repoURL: https://charts.longhorn.io
      chart: longhorn
      targetRevision: 1.7.2
      helm:
        valueFiles:
          - $values/mbtux-kubernetes/infrastructure/longhorn/values.yaml
    - repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
  ignoreDifferences:
    - group: longhorn.io
      kind: Volume
      jsonPointers:
        - /spec/numberOfReplicas
