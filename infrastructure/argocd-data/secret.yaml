    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: argocd
type: Opaque
data:
  # admin / Mritunjay@123 (base64 encoded)
  admin.password: TXJpdHVuamF5QDEyMw==
  admin.passwordMtime: MjAyNi0wNC0wN1QyMTozMDowMFo=
  # OIDC Client Secret for Authentik (base64 encoded)
  dex.authentik.clientSecret: NU9CNFdqbVhUYlZ4SnlOQWE2TmVxTzJQNEhFeVhuY201RDZqZVR3S2RJSTNRamQ1RjN5Z3U3dHdYWTBw
