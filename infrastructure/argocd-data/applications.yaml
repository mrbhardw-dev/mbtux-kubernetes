apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-cluster-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: data-cluster
    app.kubernetes.io/part-of: argocd
    cluster: data
spec:
  project: data-cluster
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes
    targetRevision: main
    path: bootstrap/data-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
