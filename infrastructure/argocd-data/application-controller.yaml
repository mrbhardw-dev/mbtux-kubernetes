apiVersion: v1
kind: Service
metadata:
  name: application-controller
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - name: metrics
      port: 8082
      targetPort: 8082
  selector:
    app.kubernetes.io/name: argocd-application-controller
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: application-controller
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-application-controller
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  serviceName: argocd-application-controller
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-application-controller
    spec:
      serviceAccountName: argocd-application-controller
      containers:
        - name: application-controller
          image: quay.io/argoproj/argocd:v2.13.3
          command:
            - /usr/local/bin/argocd-application-controller
          args:
            - --redis
            - redis:6379
          ports:
            - name: metrics
              containerPort: 8082
          env:
            - name: ARGOCD_CONTROLLER_REPLICAS
              value: "1"
            - name: ARGOCD_CONTROLLER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ARGOCD_REPOSERVER
              value: "argocd-repo-server:8081"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: argocd-repo-server-tls
              mountPath: /app/config/controller/tls
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: argocd-repo-server-tls
          emptyDir: {}
        - name: tmp
          emptyDir: {}
