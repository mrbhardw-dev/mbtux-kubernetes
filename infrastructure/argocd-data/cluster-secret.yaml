# Management cluster credentials for Argo CD
#
# SETUP:
#   1. Run scripts/setup-mgmt-cluster-credentials.sh ON THE MANAGEMENT CLUSTER
#   2. Paste the output values below
#   3. Commit and push (use SealedSecrets or SOPS in production)
#
apiVersion: v1
kind: Secret
metadata:
  name: cluster-mgmt
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: argocd
    argocd.argoproj.io/secret-type: cluster
    cluster: mgmt
type: Opaque
stringData:
  name: mgmt
  # PASTE from script output: server
  server: "https://REPLACE_WITH_MGMT_API_SERVER:6443"
  config: |
    {
      "bearerToken": "REPLACE_WITH_BEARER_TOKEN",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "REPLACE_WITH_CA_DATA"
      }
    }
    }
