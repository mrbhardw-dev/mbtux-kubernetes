apiVersion: v1
kind: Service
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
spec:
  ports:
    - name: server
      port: 8081
      targetPort: 8081
    - name: metrics
      port: 8084
      targetPort: 8084
  selector:
    app.kubernetes.io/name: argocd-repo-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
    spec:
      serviceAccountName: argocd-repo-server
      automountServiceAccountToken: false
      containers:
        - name: argocd-repo-server
          image: quay.io/argoproj/argocd:v2.13.3
          command:
            - /usr/local/bin/argocd-repo-server
          args:
            - --redis
            - redis:6379
          env:
            - name: KUSTOMIZE_ENABLE_HELM
              value: "true"
            - name: ARGOCD_REPO_SERVER_KUSTOMIZE_BUILD_OPTIONS
              value: "--enable-helm"
            - name: ARGOCD_REPOSERVER_KUSTOMIZE_BUILD_OPTIONS
              value: "--enable-helm"
          ports:
            - name: server
              containerPort: 8081
            - name: metrics
              containerPort: 8084
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: gpg-keys
              mountPath: /app/config/gpg/keys
      volumes:
        - name: tmp
          emptyDir: {}
        - name: gpg-keys
          emptyDir: {}
