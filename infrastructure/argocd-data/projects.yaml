apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: argocd
    cluster: data
spec:
  description: Data cluster - infrastructure and application workloads
  sourceRepos:
    - https://github.com/mrbhardw-dev/mbtux-kubernetes
    - https://charts.zitadel.com
    - https://kubernetes.github.io/ingress-nginx
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: data-admin
      description: Full access to data cluster resources
      policies:
        - p, proj:data-cluster:data-admin, applications, *, data-cluster/*, allow
      groups:
        - data-admins
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mgmt-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/part-of: argocd
    cluster: mgmt
spec:
  description: Management cluster - infrastructure and platform workloads
  sourceRepos:
    - https://github.com/mrbhardw-dev/mbtux-kubernetes
    - https://releases.rancher.com/server-charts/stable
  destinations:
    - namespace: '*'
      server: https://192.168.0.201:6443
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  roles:
    - name: mgmt-admin
      description: Full access to management cluster resources
      policies:
        - p, proj:mgmt-cluster:mgmt-admin, applications, *, mgmt-cluster/*, allow
      groups:
        - mgmt-admins
