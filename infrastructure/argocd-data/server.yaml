apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8083
      protocol: TCP
  selector:
    app.kubernetes.io/name: argocd-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      serviceAccountName: argocd-server
      containers:
        - name: argocd-server
          image: quay.io/argoproj/argocd:v2.13.3
          command:
            - /usr/local/bin/argocd-server
          args:
            - --staticassets
            - /shared/app
            - --redis
            - redis:6379
            - --repo-server
            - argocd-repo-server:8081
            - --insecure
          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8083
          env:
            - name: ARGOCD_SERVER_INSECURE
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz?full=true
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: argocd-repo-server-tls
              mountPath: /app/config/server/tls
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: argocd-repo-server-tls
          emptyDir: {}
        - name: tmp
          emptyDir: {}
