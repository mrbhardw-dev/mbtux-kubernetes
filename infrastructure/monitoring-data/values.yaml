kube-prometheus-stack:
  # Disable default Grafana deployment (centralized on Management cluster)
  grafana:
    enabled: false

  # Prometheus configuration - Data cluster (Spoke)
  prometheus:
    prometheusSpec:
      replicas: 1
      retention: 5d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

      # External label to distinguish Data cluster metrics in Grafana
      externalLabels:
        cluster: data-cluster

      # Remote Write to Management cluster Prometheus
      remoteWrite:
        - url: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090/api/v1/write"
          # Optional: filter which metrics to send
          # writeRelabelConfigs:
          #   - sourceLabels: [__name__]
          #     regex: ".*"
          #     action: keep

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
            # Uncomment if you have a StorageClass available
            # storageClassName: proxmox-csi

      # Service configuration
      service:
        type: ClusterIP

  # Node Exporter
  nodeExporter:
    enabled: true

  # kube-state-metrics
  kubeStateMetrics:
    enabled: true

  # Alertmanager - disable (centralized on Management cluster)
  alertmanager:
    enabled: false

  # Prometheus Operator
  prometheusOperator:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
