apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-mgmt
  namespace: argocd
  labels:
    app: monitoring
    env: management
spec:
  project: default
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: infrastructure/monitoring-data/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true