apiVersion: apps/v1
kind: Deployment
metadata:
  name: scratch
  namespace: scratch
  labels:
    app.kubernetes.io/name: scratch
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scratch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scratch
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: scratch
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5