global:
  domain: argocd.mbtux.com

configs:
  cm:
    url: "https://argocd.mbtux.com"
    admin.enabled: "true"
    rbac.policy.csv: |
      g, admin, role:admin
      g, argocd-admins, role:admin
      g, argocd-users, role:admin
    rbac.scopes: "[groups]"
    oidc.config: |
      name: Authentik
      issuer: https://authentik.mbtux.com/application/o/argocd/
      clientID: argocd
      clientSecret: iJ7RwzWqpF6YQd2oSmaRrls0C5bToZda0V25ry4OJyg
      requestedScopes: ["openid", "profile", "email", "groups"]
    # OIDC config added in Phase 3
  params:
    server.insecure: "true"
    server.disableAuth: "false"
    # External PostgreSQL connection
    server.database.url: "postgresql://argocd:9rmv9yB2ptdewOIvgRU5AZF24lSMeUggGahiBmy3MbI@postgresql-argocd.postgresql-argocd.svc.cluster.local:5432/argocd?sslmode=disable"
  secret:
    argocd.secret: ""

server:
  replicas: 1
  service:
    type: ClusterIP

  ingress:
    enabled: false

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

applicationController:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

controller:
  resources:
    requests:
      cpu: 200m
      memory: 500Mi
    limits:
      cpu: 1000m
      memory: 1Gi

redis:
  enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 8Gi

# Use external PostgreSQL (deployed separately)
postgresql:
  enabled: false

dex:
  enabled: false

ha:
  enabled: true

notifications:
  enabled: false

appFactory:
  createDefaultNamespace: false

prometheus:
  sidecar:
    enabled: false
