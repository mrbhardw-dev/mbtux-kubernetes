postgresql:
  enabled: true
  commonAnnotations:
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-1"
  auth:
    database: zitadel
    username: zitadel
    password: zitadel
    postgresPassword: zitadel
  primary:
    persistence:
      enabled: true
      size: 10Gi

zitadel:
  masterkeySecretName: zitadel-masterkey

  configmapConfig:
    ExternalDomain: auth.mbtux.com
    ExternalSecure: true
    ExternalPort: 443

    TLS:
      Enabled: false

    FirstInstance:
      Org:
        Human:
          UserName: admin
          Email: admin@mbtux.com
          Password: "Admin@2026!"
          PasswordChangeRequired: true

    # SMTP must be configured via Console UI after first login:
    # Settings -> SMTP Settings -> Add SMTP Provider
    # Host: smtppro.zoho.eu:587 (StartTLS)
    # User: mritunjay.bhardwaj@mbtux.com

  debug:
    enabled: false

replicaCount: 1

ingress:
  enabled: true
  controller: nginx
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: auth.mbtux.com
      paths:
        - path: /
          pathType: Prefix

login:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
