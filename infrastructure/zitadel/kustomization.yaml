apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: identity

resources:
  - namespace.yaml
  - masterkey-secret.yaml
  - placeholder-secrets.yaml

helmCharts:
  - name: zitadel
    repo: https://charts.zitadel.com
    releaseName: zitadel
    namespace: identity
    valuesFile: values.yaml
