apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared-mgmt
data:
  config.yaml: |
    tunnel: cloudflared-mgmt
    ingress:
      - hostname: argocd.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: authentik.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: outline.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: grafana.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: sure.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: wekan.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: taiga.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - hostname: immich.mbtux.com
        service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-mgmt
  namespace: cloudflared-mgmt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --no-autoupdate
        - run
        - --config
        - /etc/cloudflared/config/config.yaml
        env:
        - name: CLOUDFLARE_TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: cloudflared-token
              key: TUNNEL_TOKEN
        volumeMounts:
        - name: config
          mountPath: /etc/cloudflared/config
      volumes:
      - name: config
        configMap:
          name: cloudflared-config