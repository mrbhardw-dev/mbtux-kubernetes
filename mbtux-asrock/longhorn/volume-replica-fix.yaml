# Longhorn Volume Replica Fix
# This CronJob patches all Longhorn volumes to have 1 replica
# It runs every 5 minutes to catch new volumes
# Note: This is a workaround as default-replica-count setting doesn't apply to existing volumes
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-volume-replica-fix
  namespace: longhorn-system
  labels:
    app: longhorn-volume-replica-fix
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: longhorn-volume-replica-fix
        spec:
          serviceAccountName: longhorn-volume-replica-fix-sa
          restartPolicy: OnFailure
          containers:
            - name: fix-replicas
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  # Get all Longhorn volumes
                  echo "Checking Longhorn volumes..."
                  volumes=$(kubectl get volumes.longhorn.io -n longhorn-system -o jsonpath='{.items[*].metadata.name}')
                  
                  if [ -z "$volumes" ]; then
                    echo "No Longhorn volumes found"
                    exit 0
                  fi
                  
                  for volume in $volumes; do
                    echo "Processing volume: $volume"
                    current=$(kubectl get volumes.longhorn.io $volume -n longhorn-system -o jsonpath='{.spec.numberOfReplicas}')
                    echo "  Current replicas: $current"
                    
                    if [ "$current" != "1" ]; then
                      echo "  Patching to 1 replica..."
                      kubectl patch volumes.longhorn.io $volume -n longhorn-system \
                        --type merge \
                        -p '{"spec":{"numberOfReplicas":1}}'
                      echo "  Patched successfully"
                    else
                      echo "  Already at 1 replica, skipping"
                    fi
                  done
                  
                  echo "Done processing volumes"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-volume-replica-fix-sa
  namespace: longhorn-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-volume-replica-fix-role
  namespace: longhorn-system
rules:
  - apiGroups: ["longhorn.io"]
    resources: ["volumes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-volume-replica-fix-rolebinding
  namespace: longhorn-system
subjects:
  - kind: ServiceAccount
    name: longhorn-volume-replica-fix-sa
    namespace: longhorn-system
roleRef:
  kind: Role
  name: longhorn-volume-replica-fix-role
  apiGroup: rbac.authorization.k8s.io
