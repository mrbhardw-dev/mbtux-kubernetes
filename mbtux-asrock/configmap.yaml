# Cloudflare Tunnel Configuration
# This configmap contains the tunnel configuration for all services
# Tunnel ID: 52cce491-b5b2-4c6c-991c-25839733a4b3
# Domain: mbtux.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    tunnel: 52cce491-b5b2-4c6c-991c-25839733a4b3
    protocol: http2
    
    # Ingress rules for all services
    # All traffic goes to the Nginx Ingress Controller at 192.168.0.210
    ingress:
      # ArgoCD - argo.mbtux.com
      - hostname: argo.mbtux.com
        service: https://192.168.0.210
        originRequest:
          noTLSVerify: false
          connectTimeout: 60s
          tlsTimeout: 10s
      
      # Nextcloud - nextcloud.mbtux.com
      - hostname: nextcloud.mbtux.com
        service: https://192.168.0.210
        originRequest:
          noTLSVerify: false
          connectTimeout: 60s
          tlsTimeout: 10s
      
      # Longhorn - longhorn.mbtux.com
      - hostname: longhorn.mbtux.com
        service: https://192.168.0.210
        originRequest:
          noTLSVerify: false
          connectTimeout: 60s
          tlsTimeout: 10s
      
      # Grafana - grafana.mbtux.com (direct to grafana service)
      - hostname: grafana.mbtux.com
        service: http://192.168.0.196:3000
        originRequest:
          connectTimeout: 60s
      
      # Catch-all rule - route to Nginx Ingress Controller
      - service: https://192.168.0.210
        originRequest:
          noTLSVerify: false
          connectTimeout: 60s
          tlsTimeout: 10s
