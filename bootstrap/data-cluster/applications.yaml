apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zitadel
  namespace: argocd
  labels:
    app.kubernetes.io/name: zitadel
    app.kubernetes.io/part-of: identity
    cluster: data
spec:
  project: data-cluster
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes
    targetRevision: main
    path: infrastructure/zitadel
    kustomize:
      buildOptions: "--enable-helm"
  destination:
    server: https://kubernetes.default.svc
    namespace: identity
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
---
