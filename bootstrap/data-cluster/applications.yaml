apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/part-of: identity
    cluster: data
spec:
  project: data-cluster
  source:
    repoURL: https://charts.goauthentik.io
    chart: authentik
    targetRevision: 2026.2.1
    helm:
      parameters:
        - name: global.domain
          value: authentik.mbtux.com
        - name: authentik.secret_key
          value: e0a66085992a094ef36a2a7dc73f149d66d5bd4f71fe687414279f4a34b4e4b7
        - name: authentik.password
          value: Mritunjay@123
        - name: authentik.postgresql.password
          value: authentik_pass
        - name: postgresql.enabled
          value: "true"
        - name: postgresql.auth.database
          value: authentik
        - name: postgresql.auth.username
          value: authentik
        - name: postgresql.auth.password
          value: authentik_pass
        - name: persistence.enabled
          value: "true"
        - name: persistence.size
          value: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
    ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
      - /spec/template/metadata/managedFields
      - /status
    - group: v1
      kind: ConfigMap
      jsonPointers:
      - /data/config.yaml
      - /metadata/managedFields
    - group: v1
      kind: Secret
      jsonPointers:
      - /metadata/managedFields
      - /data/postgresql-password
      - /data/authentik-secret-key
---
