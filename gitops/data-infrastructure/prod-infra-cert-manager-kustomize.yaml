apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-infra-cert-manager
  namespace: argocd
  labels:
    app.kubernetes.io/name: prod-infra-cert-manager
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: infrastructure
spec:
  project: data-prod-infrastructure

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.17.0
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        nodeSelector:
          kubernetes.io/os: linux
        dns01RecursiveNameservers: "1.1.1.1:53,9.9.9.9:53"
        dns01RecursiveNameserversList:
          - 1.1.1.1:53
          - 9.9.9.9:53

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m