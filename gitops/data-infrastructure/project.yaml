apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: mbtux-platform
    platform.scope: data
    platform.cluster: data-prod
spec:
  description: Production data infrastructure (ingress, TLS, monitoring)
  sourceRepos:
    - https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    - https://charts.jetstack.io
    - https://helm.traefik.io/traefik
  destinations:
    - namespace: '*'
      server: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'