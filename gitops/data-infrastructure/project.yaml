apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data-prod-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
spec:
  description: Production data infrastructure components (certificates, ingress, load balancing, monitoring)

  sourceRepos:
    - https://charts.jetstack.io
    - https://helm.traefik.io/traefik
    - https://github.com/mrbhardw-dev/mbtux-kubernetes.git

  destinations:
    - namespace: cert-manager
      server: https://192.168.0.211:6443
    - namespace: cloudflared
      server: https://192.168.0.211:6443
    - namespace: monitoring
      server: https://192.168.0.211:6443
    - namespace: traefik
      server: https://192.168.0.211:6443

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
