apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-platform-infra
  namespace: argocd
  labels:
    app.kubernetes.io/name: data-prod-traefik
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: infrastructure
spec:
  project: data-prod-infrastructure

  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: production-infrastructure/traefik

  destination:
    server: https://192.168.0.211:6443
    namespace: traefik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
