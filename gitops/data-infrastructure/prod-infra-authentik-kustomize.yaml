apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-infra-authentik
  namespace: argocd
  labels:
    app.kubernetes.io/name: prod-infra-authentik
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: infrastructure
spec:
  project: data-prod-infrastructure

  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: production-infrastructure/authentik/manifests

  destination:
    server: https://api.data-prod-cluster.mbtux.com:6443
    namespace: authentik

  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated: {}
