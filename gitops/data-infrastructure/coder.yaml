apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder.mbtux.com
  namespace: argocd
  labels:
    app.kubernetes.io/name: coder.mbtux.com
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: workload
spec:
  project: data-prod-workloads

  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: production-infrastructure/coder/manifests

  destination:
    server: https://192.168.0.211:6443
    namespace: coder

  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated: {}
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
