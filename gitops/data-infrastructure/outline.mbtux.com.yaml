apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: outline.mbtux.com
  namespace: argocd
  labels:
    app.kubernetes.io/name: outline.mbtux.com
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: workload
spec:
  project: data-prod-workloads
  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: production-infrastructure/outline/manifests
   destination:
     server: https://kubernetes.default.svc
     namespace: outline
  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated: {}