apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coder.mbtux.com
  namespace: argocd
  labels:
    app.kubernetes.io/name: coder.mbtux.com
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: workload
spec:
  project: data-prod-workloads

  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: clusters/data-prod/coder/manifests

  destination:
    server: https://192.168.0.211:6443
    namespace: coder

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: null
