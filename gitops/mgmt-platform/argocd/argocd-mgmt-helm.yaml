apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-management-helm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-management-helm
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.tier: management
    app.kubernetes.io/component: core
spec:
  project: mgmt-platform

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.5.2
    helm:
      releaseName: argocd
      values: |
        global:
          logging:
            format: json
            level: info

        image:
          tag: v3.3.9

        namespace: argocd

        server:
          extraArgs:
            - --insecure=true
          config:
            url: https://argocd-mgmt.mbtux.com
            admin.enabled: "true"
            # OIDC SSO via Authentik
            # Register redirect URI in Authentik: https://argocd-mgmt.mbtux.com/auth/callback
            oidc.config: |
              name: authentik
              clientID: $argocd-oidc-secret:client-id
              clientSecret: $argocd-oidc-secret:client-secret
              issuer: https://authentik.mbtux.com/application/o/argocd/
              scopes:
                - openid
                - profile
                - email
          rbacConfig:
            policy.default: role:admin

        controller:
          replicas: 2
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi

        repoServer:
          replicas: 2
          autoscaling:
            enabled: false
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          timeout: 180s
          env:
            - name: HELM_CACHE_HOME
              value: /tmp/helm/cache
            - name: HELM_CONFIG_HOME
              value: /tmp/helm/config
            - name: HELM_DATA_HOME
              value: /tmp/helm/data
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: http_proxy
              value: ""
            - name: https_proxy
              value: ""
            - name: NO_PROXY
              value: "*"
            - name: no_proxy
              value: "*"
          dnsPolicy: ClusterFirst
          dnsConfig:
            nameservers:
              - 8.8.8.8
              - 8.8.4.4
              - 1.1.1.1

        applicationSet:
          enabled: true
          replicas: 2

        dex:
          enabled: false

        notifications:
          enabled: true

        redis:
          replicas: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

        ha:
          enabled: false
          redisProxyReplicas: 2
          redisHa:
            enabled: false
            haproxy:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated: null
    syncOptions:
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/selector
        - /spec/template/metadata/labels/app.kubernetes.io~1instance
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/selector
        - /spec/serviceName
        - /spec/template/metadata/labels/app.kubernetes.io~1instance
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector/app.kubernetes.io~1instance
        - /spec/ports/0/targetPort
        - /spec/ports/1/targetPort
