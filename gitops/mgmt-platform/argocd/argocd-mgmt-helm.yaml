apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-management-helm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-management-helm
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.tier: management
    app.kubernetes.io/component: core
spec:
  project: mgmt-platform

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.5.2
    helm:
      releaseName: argocd
      values: |
        global:
          logging:
            format: json
            level: info

        image:
          tag: v3.3.9

        namespace: argocd

        server:
          extraArgs:
            - --insecure=true

        configs:
          cm:
            url: https://argocd-mgmt.mbtux.com
            admin.enabled: "true"
            oidc.config: |
              name: authentik
              clientID: lq7UpiQKTUsI58m9QGeDYWVf1ZatctFi2u7mKwQO
              clientSecret: 5HS1oKX10sWCyYhhhhl08e74umaePF71aSSi5dKok9ZMH4IJIv6BU1ETrpkMWFpuoSUFF83X7aG5ty63hEhBRdowr5iyio2XBa19UyB0oOIuZJxsqpNK8hy2j4P5vdcF
              issuer: https://authentik.mbtux.com/application/o/argocd/
              scopes:
                - openid
                - profile
                - email
          rbac:
            policy.default: role:admin

        controller:
          replicas: 2
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi

        repoServer:
          replicas: 2
          autoscaling:
            enabled: false
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          timeout: 180s
          dnsPolicy: ClusterFirst
          dnsConfig:
            nameservers:
              - 8.8.8.8
              - 8.8.4.4
              - 1.1.1.1

        applicationSet:
          enabled: true
          replicas: 2

        dex:
          enabled: false

        notifications:
          enabled: true

        redis:
          replicas: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

        ha:
          enabled: false
          redisProxyReplicas: 2
          redisHa:
            enabled: false
            haproxy:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    # Manual sync - only sync on explicit GitHub push
    automated: null
    syncOptions:
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/selector
        - /spec/template/metadata/labels/app.kubernetes.io~1instance
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/selector
        - /spec/serviceName
        - /spec/template/metadata/labels/app.kubernetes.io~1instance
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/selector/app.kubernetes.io~1instance
        - /spec/ports/0/targetPort
        - /spec/ports/1/targetPort
