apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-data-prod-workloads
  namespace: argocd
  labels:
    app.kubernetes.io/name: root-data-prod-workloads
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.scope: data
    platform.cluster: data-prod
    app.kubernetes.io/component: root
spec:
  project: data-prod-workloads

  source:
    repoURL: https://github.com/mrbhardw-dev/mbtux-kubernetes.git
    targetRevision: main
    path: gitops/data-infrastructure
    directory:
      include: 'prod-apps-*.yaml'

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # Manual sync - only sync on explicit GitHub push
    automated: null
