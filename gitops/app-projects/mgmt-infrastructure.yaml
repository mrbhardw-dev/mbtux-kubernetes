apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mgmt-infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.tier: management
spec:
  description: Shared infrastructure components (certificates, ingress, load balancing, monitoring)

  sourceRepos:
    - https://charts.jetstack.io
    - https://github.com/mrbhardw-dev/mbtux-kubernetes.git

  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: cloudflared
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: "*"
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
