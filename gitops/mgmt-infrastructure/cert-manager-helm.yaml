apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mgmt-infrastructure-cert-manager
  namespace: argocd
  labels:
    app.kubernetes.io/name: mgmt-infrastructure-cert-manager
    app.kubernetes.io/part-of: mbtux-platform
    app.kubernetes.io/managed-by: argocd
    platform.tier: management
    app.kubernetes.io/component: infrastructure
spec:
  project: mgmt-infrastructure

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.2
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
