# Data Cluster Import Registration
# This creates the cluster entry in Rancher. After applying, you must
# run the import command on the data cluster to install the Rancher agent.
---
apiVersion: provisioning.cattle.io/v1
kind: Cluster
metadata:
  name: data-cluster
  namespace: fleet-default
  labels:
    cluster: data
    environment: production
    data: "true"
  annotations:
    description: "Data cluster for application workloads"
spec: {}
