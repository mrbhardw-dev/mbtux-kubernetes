apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-config
  namespace: headlamp
data:
  config.yaml: |
    # Headlamp plugin configuration for multi-cluster support
    clusters:
      - name: mgmt-context
        displayName: "Management Cluster"
        kubeconfigPath: /home/headlamp/.kube/config
        default: true
      - name: data-context
        displayName: "Data Cluster"
        kubeconfigPath: /home/headlamp/.kube/config
        default: false
    
    # Plugin settings
    plugins:
      enabled:
        - cluster-switcher
        - multi-cluster-view
        - prometheus
      prometheus:
        url: "http://prometheus-service.monitoring.svc.cluster.local:9090"
        serviceAddress: "monitoring/prometheus-service:9090"
        queryRangeDuration: "1h"
        maxSamples: 10000
        cacheEnabled: true
        cacheInterval: "5m"
    
    # Theme settings (optional)
    theme:
      mode: light
    
    # Cache settings
    cache:
      enabled: true
      ttl: 300
