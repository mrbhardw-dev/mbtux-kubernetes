apiVersion: v1
kind: ConfigMap
metadata:
  name: headlamp-config
  namespace: headlamp
data:
  config.yaml: |
    # Headlamp plugin configuration for multi-cluster support
    clusters:
      - name: mgmt-context
        displayName: "Management Cluster"
        kubeconfigPath: /home/headlamp/.kube/config
        default: true
      - name: data-context
        displayName: "Data Cluster"
        kubeconfigPath: /home/headlamp/.kube/config
        default: false

    # Plugin settings
    plugins:
      enabled:
        - cluster-switcher
        - multi-cluster-view
        - prometheus
      prometheus:
        clusters:
          - cluster: mgmt-context
            url: "http://192.168.0.201:30090"
            serviceAddress: "monitoring/prometheus-nodeport:9090"
          - cluster: data-context
            url: "http://192.168.0.211:30090"
            serviceAddress: "monitoring/prometheus-nodeport:9090"
        queryRangeDuration: "1h"
        maxSamples: 10000
        cacheEnabled: true
        cacheInterval: "5m"

    # Theme settings (optional)
    theme:
      mode: light

    # Cache settings
    cache:
      enabled: true
      ttl: 300
