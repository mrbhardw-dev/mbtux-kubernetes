apiVersion: v1
kind: Secret
metadata:
  name: headlamp-kubeconfig
  namespace: headlamp
type: Opaque
stringData:
  config: |
    apiVersion: v1
    clusters:
    - cluster:
        certificate-authority-data: 
        server: https://192.168.0.211:6443
      name: data-cluster
    - cluster:
        certificate-authority-data: 
        server: https://192.168.0.201:6443
      name: mgmt-cluster
    contexts:
    - context:
        cluster: data-cluster
        user: data-user
      name: data-context
    - context:
        cluster: mgmt-cluster
        user: mgmt-user
      name: mgmt-context
    current-context: mgmt-context
    kind: Config
    users:
    - name: data-user
      user:
        client-certificate-data: 
        client-key-data: 
    - name: mgmt-user
      user:
        client-certificate-data: 
        client-key-data: 