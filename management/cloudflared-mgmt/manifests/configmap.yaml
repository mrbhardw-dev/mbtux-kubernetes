apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared-mgmt
data:
  config.yaml: |
    tunnel: c6a8da22-bc3d-4462-8211-875386480d9f
    ingress:
      - hostname: prometheus.mgmt.mbtux.com
        service: http://prometheus.monitoring.svc.cluster.local:9090
      - hostname: grafana-mgmt.mbtux.com
        originRequest:
          noTLSVerify: true
        service: http://grafana.monitoring.svc.cluster.local:3000
      - service: http_status:404