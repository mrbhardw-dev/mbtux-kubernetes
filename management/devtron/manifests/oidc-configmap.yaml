# Devtron OIDC Configuration with Authentik
# Apply this after setting up Authentik OAuth2 provider

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: devtroncd
data:
  # Enable OIDC
  ENABLE_LOGIN_GITHUB_OAUTH: "false"
  ENABLE_OAUTH: "true"
  
  # Authentik OIDC Provider
  OAUTH_OIDC_CLIENT_ID: devtron
  OAUTH_OIDC_CLIENT_SECRET: $AUTHENTIK_CLIENT_SECRET
  OAUTH_OIDC_ISSUER_URL: https://authentik.mbtux.com/oauth2/
  OAUTH_SCOPE: openid,profile,email,groups
  OAUTH_TOKEN_URL: https://authentik.mbtux.com/oauth2/token/
  OAUTH_USER_GROUPS_KEY: groups