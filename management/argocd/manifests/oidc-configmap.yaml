# ArgoCD OIDC Configuration with Authentik
# Apply this after setting up Authentik OAuth2 provider

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Authentik OIDC Provider
  url: https://argocd.mbtux.com
  oidc.config: |
    name: Authentik
    issuer: https://authentik.mbtux.com
    clientID: argocd
    clientSecret: $AUTHENTIK_CLIENT_SECRET
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    # Role mapping (optional)
    # claims:
    #   groups: groups