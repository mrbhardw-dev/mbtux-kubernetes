# Authentik connector for ArgoCD Dex
# Add this to the existing argocd-dex-cm configmap

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-dex-cm
  namespace: argocd
data:
  config.yaml: |
    connectors:
      # Authentik OIDC
      - type: oidc
        id: authentik
        name: Authentik
        config:
          issuer: https://authentik.mbtux.com/oauth2/
          clientID: argocd-dex
          clientSecret: $AUTHENTIK_CLIENT_SECRET
          redirectURI: https://argocd.mbtux.com/api/dex/callback
          scopes:
            - openid
            - profile
            - email
            - groups
          # Optional: claims mapping
          # claimMapping:
          #   groups: groups