ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: nextcloud.mbtux.com
      paths:
        - path: /
          pathType: Prefix

nextcloud:
  host: nextcloud.mbtux.com
  username: admin
  password: "changeme123"

persistence:
  enabled: true
  storageClass: nfs-client
  accessMode: ReadWriteOnce
  size: 50Gi

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        password: "nextcloud123"
        username: nextcloud
        database: nextcloud

redis:
  enabled: true
  auth:
    enabled: true
    password: "redis123"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 2Gi
    cpu: 1000m