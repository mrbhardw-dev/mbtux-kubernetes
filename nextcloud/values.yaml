ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: nextcloud.mbtux.com
      paths:
        - path: /
          pathType: Prefix

nextcloud:
  host: nextcloud.mbtux.com
  username: admin
  password: "changeme123"

persistence:
  enabled: true
  storageClass: nfs-client
  accessMode: ReadWriteOnce
  size: 50Gi

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        password: "nextcloud123"
        username: nextcloud
        database: nextcloud

redis:
  enabled: true
  auth:
    enabled: true
    password: "redis123"

resources:
  requests:
    memory: 512Mi
    cpu: 250m
  limits:
    memory: 4Gi
    cpu: 2000m

livenessProbe:
  enabled: true
  initialDelaySeconds: 600
  periodSeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 600
  periodSeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10
  successThreshold: 1

startupProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 60
  successThreshold: 1