apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://nextcloud.github.io/helm/
      chart: nextcloud
      targetRevision: 9.0.3
      helm:
        valueFiles:
          - $values/nextcloud/values.yaml
    - repoURL: https://github.com/mrbhardw-dev/ArgoCD
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: nextcloud
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: nextcloud-postgresql
      namespace: nextcloud
      jsonPointers:
        - /data/password
        - /data/postgres-password
    - group: ""
      kind: Secret
      name: nextcloud-redis
      namespace: nextcloud
      jsonPointers:
        - /data/redis-password